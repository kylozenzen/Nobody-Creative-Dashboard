<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Nobody Studios HQ</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Inter:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --yellow:#F5C800;--yd:#8A6F00;--yb:#1a1500;
  --bg:#0d0d0d;--bg2:#161616;--bg3:#1e1e1e;--bg4:#262626;
  --border:#2a2a2a;--border2:#383838;
  --text:#e8e8e8;--text2:#999;--text3:#555;
  --green:#22c55e;--blue:#3b82f6;--red:#ef4444;--orange:#f97316;
  --sw:210px;--radius:8px;--radius-lg:12px;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column}
#app{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
#sidebar{width:var(--sw);background:var(--bg2);display:flex;flex-direction:column;flex-shrink:0;border-right:1px solid var(--border);overflow-y:auto}
#logo{padding:20px 16px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
#logo .wm{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.08em;color:var(--yellow);line-height:1}
#logo .sub{font-family:'Space Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:.2em;margin-top:2px}
.nl{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.18em;color:var(--text3);padding:14px 16px 5px;text-transform:uppercase}
.ni{display:flex;align-items:center;gap:9px;padding:9px 16px;cursor:pointer;font-size:13px;color:var(--text2);border-left:2px solid transparent;user-select:none;transition:all .12s}
.ni:hover{background:var(--bg3);color:var(--text)}
.ni.active{color:var(--yellow);border-left-color:var(--yellow);background:var(--yb)}
.nd{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dl{background:var(--green)}.db{background:var(--yellow)}.da{background:var(--blue)}.do{background:var(--text3)}
.ni-cfg{margin-left:auto;width:5px;height:5px;border-radius:50%;background:var(--yellow);flex-shrink:0}
.ni-add{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.1em;color:var(--text3);padding:12px 16px;cursor:pointer;border-left:2px solid transparent;transition:all .12s}
.ni-add:hover{color:var(--yellow);background:var(--bg3)}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
#topbar{padding:16px 24px 0;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--bg2)}
.tb-top{display:flex;align-items:center;gap:10px;padding-bottom:12px}
#pt{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:.06em;color:var(--text);flex:1}
.sbadge{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:4px 9px;border-radius:4px}
.bl{background:#052e16;color:#4ade80}.bb{background:#1c1100;color:#fbbf24}.ba{background:#0c1a3d;color:#60a5fa}.bo{background:var(--bg3);color:var(--text3)}
.cfg-btn{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.08em;padding:5px 12px;border-radius:var(--radius);border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;transition:all .12s}
.cfg-btn:hover{border-color:var(--yellow);color:var(--yellow)}
.cfg-btn.done{border-color:#14532d;color:var(--green)}
.tabs{display:flex;gap:0}
.tab{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:10px 16px;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .12s;user-select:none}
.tab:hover{color:var(--text2)}
.tab.on{color:var(--yellow);border-bottom-color:var(--yellow)}

/* SCROLL BODY */
#scroll-body{flex:1;overflow-y:auto;padding:22px 24px}
#scroll-body::-webkit-scrollbar{width:4px}
#scroll-body::-webkit-scrollbar-track{background:transparent}
#scroll-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* FORM ELEMENTS */
input,textarea,select{font-family:'Inter',sans-serif;font-size:13px;color:var(--text);background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:8px 11px;width:100%;outline:none;transition:border-color .12s}
input:focus,textarea:focus,select:focus{border-color:var(--yellow)}
select option{background:var(--bg3)}
textarea{resize:vertical;min-height:72px;line-height:1.55}
.fl{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.fl label{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--text3)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.sec-hd{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--text3);margin-bottom:10px}
.divider{height:1px;background:var(--border);margin:20px 0}
.save-btn{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.1em;padding:9px 20px;border-radius:var(--radius);border:none;background:var(--yellow);color:#111;cursor:pointer;font-weight:700;transition:opacity .12s}
.save-btn:hover{opacity:.85}
.ghost-btn{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.08em;background:transparent;border:1px dashed var(--border2);border-radius:var(--radius);padding:7px 14px;color:var(--text3);cursor:pointer;width:100%;transition:all .12s;margin-top:4px}
.ghost-btn:hover{border-color:var(--yellow);color:var(--yellow)}
.rm-btn{width:28px;height:28px;border-radius:var(--radius);border:1px solid var(--border);background:transparent;cursor:pointer;color:var(--text3);font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .12s}
.rm-btn:hover{border-color:var(--red);color:var(--red)}

/* METRICS */
.metrics-row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:20px}
.mc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:13px 15px}
.mc .ml{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-bottom:5px}
.mc .mv{font-size:20px;font-weight:500;color:var(--text)}
.mc .md{font-size:11px;color:var(--text3);margin-top:3px}

/* NEXT ACTION */
.na-block{background:var(--bg2);border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:20px;border-left:3px solid var(--yellow)}
.nal{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--yd);margin-bottom:6px}
.nat{font-size:13px;color:var(--text);line-height:1.55}

/* LINKS */
.links-row{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:20px}
.lchip{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:var(--radius);border:1px solid var(--border2);font-family:'Space Mono',monospace;font-size:10px;color:var(--text2);cursor:pointer;background:var(--bg2);text-decoration:none;letter-spacing:.05em;transition:all .12s}
.lchip:hover{border-color:var(--yellow);color:var(--yellow)}

/* TASKS */
.prog-wrap{height:3px;background:var(--bg3);border-radius:2px;margin-bottom:18px;overflow:hidden}
.prog-bar{height:100%;background:var(--yellow);border-radius:2px;transition:width .3s}
.prog-lbl{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.1em;color:var(--text3);margin-bottom:6px}
.tasks-list{display:flex;flex-direction:column;gap:5px}
.tr{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--radius);border:1px solid var(--border);font-size:13px;color:var(--text);cursor:pointer;transition:border-color .12s;background:var(--bg2)}
.tr:hover{border-color:var(--border2)}
.tr.done{color:var(--text3);text-decoration:line-through}
.tck{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;transition:all .12s}
.tck.on{background:var(--yellow);border-color:var(--yellow);color:#111}

/* KANBAN */
#kanban-wrap{display:flex;gap:14px;align-items:flex-start;min-height:300px;padding-bottom:10px}
.kb-col{flex:1;min-width:180px;background:var(--bg2);border-radius:var(--radius-lg);border:1px solid var(--border);display:flex;flex-direction:column}
.kb-col-hd{display:flex;align-items:center;justify-content:space-between;padding:12px 14px 10px;border-bottom:1px solid var(--border)}
.kb-col-title{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--text2)}
.kb-count{font-family:'Space Mono',monospace;font-size:9px;color:var(--text3);background:var(--bg3);padding:2px 6px;border-radius:10px}
.kb-cards{flex:1;padding:10px;display:flex;flex-direction:column;gap:7px;min-height:40px}
.kb-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;cursor:grab;font-size:12px;color:var(--text);line-height:1.45;position:relative;transition:border-color .12s}
.kb-card:hover{border-color:var(--border2)}
.kb-card.dragging{opacity:.4;cursor:grabbing}
.kb-card .card-tag{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.08em;padding:2px 6px;border-radius:3px;margin-bottom:5px;display:inline-block}
.kb-card .card-rm{position:absolute;top:7px;right:8px;background:transparent;border:none;color:var(--text3);cursor:pointer;font-size:13px;opacity:0;transition:opacity .12s}
.kb-card:hover .card-rm{opacity:1}
.kb-card .card-rm:hover{color:var(--red)}
.kb-col.drag-over .kb-cards{background:var(--yb);border-radius:var(--radius)}
.kb-add-wrap{padding:0 10px 10px}
.kb-add-input{font-size:12px;padding:7px 10px}
.kb-add-btn{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.08em;padding:6px;border-radius:var(--radius);border:none;background:var(--yellow);color:#111;cursor:pointer;font-weight:700;width:100%;margin-top:5px;transition:opacity .12s}
.kb-add-btn:hover{opacity:.85}
.kb-col-rename{background:transparent;border:none;border-bottom:1px solid var(--border2);border-radius:0;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--yellow);padding:2px 4px;width:120px;outline:none}

/* GA SECTION */
.ga-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:20px}
.ga-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:13px 15px}
.ga-label{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-bottom:5px}
.ga-val{font-size:22px;font-weight:500;color:var(--text)}
.ga-sub{font-size:11px;color:var(--text3);margin-top:3px}
.ga-table{width:100%;border-collapse:collapse;font-size:12px}
.ga-table th{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);text-align:left;padding:0 0 8px;border-bottom:1px solid var(--border)}
.ga-table td{padding:7px 0;border-bottom:1px solid var(--border);color:var(--text2)}
.ga-table td:last-child{text-align:right;color:var(--text);font-weight:500}
.ga-table tr:last-child td{border-bottom:none}
.ga-bar-wrap{height:3px;background:var(--bg3);border-radius:2px;margin-top:4px;overflow:hidden}
.ga-bar{height:100%;background:var(--yellow);border-radius:2px}
.ga-range-row{display:flex;gap:6px;margin-bottom:18px}
.ga-range-btn{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.08em;padding:5px 10px;border-radius:var(--radius);border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;transition:all .12s}
.ga-range-btn:hover,.ga-range-btn.on{border-color:var(--yellow);color:var(--yellow)}
.ga-loading{text-align:center;padding:40px 0;font-family:'Space Mono',monospace;font-size:11px;color:var(--text3);letter-spacing:.1em}
.ga-error{background:var(--bg2);border:1px solid #7f1d1d;border-radius:var(--radius-lg);padding:16px;font-size:13px;color:#fca5a5;line-height:1.6}
.ga-not-configured{background:var(--bg2);border:1px dashed var(--border2);border-radius:var(--radius-lg);padding:24px;text-align:center}
.ga-not-configured p{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:14px}

/* URL LIST */
.url-row{display:grid;grid-template-columns:100px 1fr 30px;gap:7px;align-items:center;margin-bottom:7px}

/* SETUP PROGRESS */
.setup-steps{display:flex;gap:8px;margin-bottom:20px}
.step{flex:1;height:3px;border-radius:2px;background:var(--border2);transition:background .3s}
.step.done{background:var(--yellow)}

/* TOAST */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:10px 18px;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.08em;color:var(--text);opacity:0;transition:all .25s;pointer-events:none;z-index:999}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div id="app">
  <div id="sidebar">
    <div id="logo">
      <div class="wm">Nobody</div>
      <div class="sub">Studios // HQ</div>
    </div>
    <div id="nav-body"></div>
  </div>
  <div id="main">
    <div id="topbar">
      <div class="tb-top">
        <h1 id="pt">—</h1>
        <span id="pb" class="sbadge">—</span>
        <button class="cfg-btn" id="cfg-btn" onclick="toggleSetup()">Configure</button>
      </div>
      <div class="tabs" id="tabs-row"></div>
    </div>
    <div id="scroll-body"></div>
  </div>
</div>
<div id="toast"></div>

<script>
// ─── DEFAULT DATA ───────────────────────────────────────────────────────────
const DEFAULTS = [
  {id:'content',label:'Content & Video',vertical:'Services',dot:'da',badge:'ba',badgeLabel:'Active',
   gaPropertyId:'',
   metrics:[{l:'Active clients',v:'—'},{l:'In flight',v:'—'},{l:'Est. MRR',v:'—'},{l:'Leads',v:'—'}],
   nextAction:'Define service tiers and build a client-facing rate card.',
   tasks:[{t:'Finalize service pricing tiers',d:false},{t:'Build content strategy portfolio page',d:false},{t:'Write case study — Zoo social growth',d:false},{t:'Set up client intake form',d:false}],
   links:[],notes:'',
   kanban:{cols:[{id:'todo',title:'To Do'},{id:'inprog',title:'In Progress'},{id:'done',title:'Done'}],
     cards:[{id:'c1',col:'todo',text:'Rate card design',tag:''},{id:'c2',col:'todo',text:'Portfolio page copy',tag:''}]}
  },
  {id:'steady',label:'Steady',vertical:'Wellness',dot:'dl',badge:'bl',badgeLabel:'Live',
   gaPropertyId:'',
   metrics:[{l:'Status',v:'Live'},{l:'Platform',v:'PWA'},{l:'Last deploy',v:'Recent'},{l:'Users',v:'—'}],
   nextAction:'Beta feedback pass — onboarding flow + custom foods on mobile.',
   tasks:[{t:'Beta feedback survey',d:false},{t:'Onboarding A/B test',d:false},{t:'Fast food guide — expand entries',d:false},{t:'Push to planetstrength.app',d:false}],
   links:[],notes:'',
   kanban:{cols:[{id:'todo',title:'To Do'},{id:'inprog',title:'In Progress'},{id:'done',title:'Done'}],
     cards:[{id:'s1',col:'todo',text:'Serving multiplier UX review',tag:''},{id:'s2',col:'inprog',text:'Onboarding rebuild',tag:''}]}
  },
  {id:'grind',label:'GRIND',vertical:'Wellness',dot:'dl',badge:'bl',badgeLabel:'Live',
   gaPropertyId:'',
   metrics:[{l:'Status',v:'Live'},{l:'Exercises',v:'110+'},{l:'Storage',v:'Local'},{l:'Users',v:'—'}],
   nextAction:'Cloud sync decision — local-only vs Firestore.',
   tasks:[{t:'Cloud sync decision',d:false},{t:'Progressive overload UX',d:false},{t:'Cardio / time-based exercises',d:false}],
   links:[],notes:'',
   kanban:{cols:[{id:'todo',title:'To Do'},{id:'inprog',title:'In Progress'},{id:'done',title:'Done'}],cards:[]}
  },
  {id:'plottwisted',label:'Plot Twisted',vertical:'Games',dot:'dl',badge:'bl',badgeLabel:'Live',
   gaPropertyId:'',
   metrics:[{l:'Mode',v:'Daily+'},{l:'Multiplayer',v:'Pass & Play'},{l:'Clue DB',v:'Growing'},{l:'Users',v:'—'}],
   nextAction:'Launch marketing — short-form gameplay clips for TikTok/Reels.',
   tasks:[{t:'Record gameplay clips for social',d:false},{t:'App Store description + screenshots',d:false},{t:'Gaming edition retro variant',d:false},{t:'Expand clue database — 50 entries',d:false}],
   links:[],notes:'',
   kanban:{cols:[{id:'todo',title:'To Do'},{id:'inprog',title:'In Progress'},{id:'done',title:'Done'}],
     cards:[{id:'pt1',col:'inprog',text:'Daily Challenge mode polish',tag:''},{id:'pt2',col:'todo',text:'Social clip recording',tag:''}]}
  },
  {id:'postiq',label:'PostIQ',vertical:'Tools',dot:'db',badge:'bb',badgeLabel:'Building',
   gaPropertyId:'',
   metrics:[{l:'Deployed',v:'Yes'},{l:'Auth',v:'Firebase'},{l:'Proxy',v:'Netlify Fn'},{l:'Users',v:'—'}],
   nextAction:'Polish Trending view + Thumbnail mgmt. Then Buffer community post.',
   tasks:[{t:'Trending view — finalize filters',d:false},{t:'Thumbnail management — mobile test',d:false},{t:'Buffer community announcement',d:false},{t:'Landing page refresh',d:true}],
   links:[{label:'App',url:'https://ccpostiq.netlify.app'}],notes:'',
   kanban:{cols:[{id:'todo',title:'To Do'},{id:'inprog',title:'In Progress'},{id:'done',title:'Done'}],
     cards:[{id:'pq1',col:'inprog',text:'Trending view filters',tag:''},{id:'pq2',col:'todo',text:'Buffer community post draft',tag:''},{id:'pq3',col:'done',text:'Landing page copy refresh',tag:''}]}
  },
];

// ─── STATE ───────────────────────────────────────────────────────────────────
const state = {
  projects: loadProjects(),
  active: 'content',
  tab: 'overview',
  setup: false,
  gaCache: {},
  gaLoading: {},
  dragging: null,
};

function loadProjects(){
  try{
    const saved = localStorage.getItem('ns_hq_v3');
    if(saved){
      const parsed = JSON.parse(saved);
      // merge any new defaults not in saved
      DEFAULTS.forEach(d=>{
        if(!parsed.find(p=>p.id===d.id)) parsed.push({...d});
      });
      return parsed;
    }
  }catch(e){}
  return DEFAULTS.map(d=>JSON.parse(JSON.stringify(d)));
}
function save(){localStorage.setItem('ns_hq_v3',JSON.stringify(state.projects));}
function proj(){return state.projects.find(p=>p.id===state.active);}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}

// ─── NAV ─────────────────────────────────────────────────────────────────────
function renderNav(){
  const verts={};
  state.projects.forEach(p=>{
    if(!verts[p.vertical]) verts[p.vertical]=[];
    verts[p.vertical].push(p);
  });
  let html='';
  Object.entries(verts).forEach(([v,ps])=>{
    html+=`<div class="nl">${v}</div>`;
    ps.forEach(p=>{
      const cfg=p.links.length>0||p.gaPropertyId;
      html+=`<div class="ni${p.id===state.active?' active':''}" data-id="${p.id}">
        <span class="nd ${p.dot}"></span>
        <span style="flex:1">${p.label}</span>
        ${cfg?'<span class="ni-cfg"></span>':''}
      </div>`;
    });
  });
  html+=`<div style="margin-top:auto;border-top:1px solid var(--border);padding-top:4px">
    <div class="ni-add" id="add-proj-btn">+ new project</div>
  </div>`;
  document.getElementById('nav-body').innerHTML=html;
  document.querySelectorAll('.ni[data-id]').forEach(el=>{
    el.addEventListener('click',()=>{
      state.active=el.dataset.id;state.tab='overview';state.setup=false;render();
    });
  });
  document.getElementById('add-proj-btn').addEventListener('click',showAddProject);
}

// ─── TOPBAR ───────────────────────────────────────────────────────────────────
function renderTopbar(){
  const p=proj();
  document.getElementById('pt').textContent=p.label;
  const b=document.getElementById('pb');
  b.textContent=p.badgeLabel;b.className='sbadge '+p.badge;
  const btn=document.getElementById('cfg-btn');
  const cfg=p.links.length>0||p.gaPropertyId;
  btn.textContent=state.setup?'← Done':cfg?'Edit setup':'Configure';
  btn.className='cfg-btn'+(cfg&&!state.setup?' done':'');
  const tabs=['overview','tasks','kanban','analytics','notes'];
  const labels=['Overview','Tasks','Board','Analytics','Notes'];
  document.getElementById('tabs-row').innerHTML=tabs.map((t,i)=>
    `<div class="tab${state.tab===t?' on':''}" data-tab="${t}">${labels[i]}</div>`
  ).join('');
  document.querySelectorAll('.tab[data-tab]').forEach(el=>{
    el.addEventListener('click',()=>{
      if(state.setup){state.setup=false;}
      state.tab=el.dataset.tab;renderBody();
    });
  });
}

// ─── OVERVIEW ────────────────────────────────────────────────────────────────
function renderOverview(){
  const p=proj();
  const total=p.tasks.length,done=p.tasks.filter(t=>t.d).length;
  const pct=total?Math.round(done/total*100):0;
  const mHTML=p.metrics.map(m=>`<div class="mc"><div class="ml">${m.l}</div><div class="mv">${m.v}</div></div>`).join('');
  const lHTML=p.links.length
    ?p.links.map(l=>`<a class="lchip" href="${l.url}" target="_blank">&#8599; ${l.label}</a>`).join('')
    :`<span style="font-size:12px;color:var(--text3);font-family:'Space Mono',monospace">No links — use Configure to add them</span>`;
  const recentTasks=p.tasks.filter(t=>!t.d).slice(0,3);
  const tHTML=recentTasks.map((t,i)=>`
    <div class="tr" data-oi="${p.tasks.indexOf(t)}">
      <div class="tck"></div><span>${t.t}</span>
    </div>`).join('');

  document.getElementById('scroll-body').innerHTML=`
    <div class="metrics-row">${mHTML}</div>
    <div class="na-block"><div class="nal">Next action</div><div class="nat">${p.nextAction}</div></div>
    <div class="sec-hd">Quick links</div>
    <div class="links-row" style="margin-bottom:20px">${lHTML}</div>
    <div class="divider"></div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <div class="sec-hd" style="margin-bottom:0">Open tasks (${p.tasks.filter(t=>!t.d).length})</div>
      <span style="font-family:'Space Mono',monospace;font-size:9px;color:var(--text3)">${pct}% done</span>
    </div>
    <div class="prog-wrap"><div class="prog-bar" style="width:${pct}%"></div></div>
    <div class="tasks-list">${tHTML||`<div style="font-size:12px;color:var(--text3);padding:8px 0">All tasks complete</div>`}</div>
    ${recentTasks.length<p.tasks.filter(t=>!t.d).length?`<div style="font-size:12px;color:var(--text3);margin-top:8px;font-family:'Space Mono',monospace;cursor:pointer" onclick="switchTab('tasks')">+ ${p.tasks.filter(t=>!t.d).length-3} more — view all tasks</div>`:''}
  `;
  document.querySelectorAll('.tr[data-oi]').forEach(el=>{
    el.addEventListener('click',()=>{const i=+el.dataset.oi;proj().tasks[i].d=true;save();renderBody();});
  });
}

// ─── TASKS ───────────────────────────────────────────────────────────────────
function renderTasks(){
  const p=proj();
  const total=p.tasks.length,done=p.tasks.filter(t=>t.d).length;
  const pct=total?Math.round(done/total*100):0;
  const tHTML=p.tasks.map((t,i)=>`
    <div class="tr${t.d?' done':''}" data-i="${i}">
      <div class="tck${t.d?' on':''}">${t.d?'&#10003;':''}</div>
      <span style="flex:1">${t.t}</span>
      <button class="rm-btn" data-ri="${i}">&#215;</button>
    </div>`).join('');
  document.getElementById('scroll-body').innerHTML=`
    <div class="prog-lbl">${pct}% complete — ${done} of ${total} done</div>
    <div class="prog-wrap" style="margin-bottom:18px"><div class="prog-bar" style="width:${pct}%"></div></div>
    <div class="tasks-list">${tHTML}</div>
    <div style="display:flex;gap:8px;margin-top:12px">
      <input id="new-task-input" placeholder="Add a task..." style="flex:1"/>
      <button class="save-btn" id="add-task-btn" style="white-space:nowrap;padding:8px 16px">Add</button>
    </div>
  `;
  document.querySelectorAll('.tr[data-i]').forEach(el=>{
    el.addEventListener('click',e=>{
      if(e.target.classList.contains('rm-btn'))return;
      proj().tasks[+el.dataset.i].d=!proj().tasks[+el.dataset.i].d;save();renderTasks();
    });
  });
  document.querySelectorAll('.rm-btn[data-ri]').forEach(btn=>{
    btn.addEventListener('click',()=>{proj().tasks.splice(+btn.dataset.ri,1);save();renderTasks();});
  });
  const inp=document.getElementById('new-task-input');
  document.getElementById('add-task-btn').addEventListener('click',()=>{
    const v=inp.value.trim();if(!v)return;
    proj().tasks.push({t:v,d:false});inp.value='';save();renderTasks();
  });
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('add-task-btn').click();});
}

// ─── KANBAN ───────────────────────────────────────────────────────────────────
function renderKanban(){
  const p=proj();
  if(!p.kanban) p.kanban={cols:[{id:'todo',title:'To Do'},{id:'inprog',title:'In Progress'},{id:'done',title:'Done'}],cards:[]};
  const kb=p.kanban;

  const colsHTML=kb.cols.map(col=>{
    const cards=kb.cards.filter(c=>c.col===col.id);
    const cardsHTML=cards.map(card=>`
      <div class="kb-card" draggable="true" data-cid="${card.id}">
        ${card.tag?`<div class="card-tag" style="background:var(--bg4);color:var(--text3)">${card.tag}</div>`:''}
        <div>${card.text}</div>
        <button class="card-rm" data-rid="${card.id}">&#215;</button>
      </div>`).join('');
    return `
      <div class="kb-col" data-col="${col.id}">
        <div class="kb-col-hd">
          <span class="kb-col-title" data-rename="${col.id}">${col.title}</span>
          <span class="kb-count">${cards.length}</span>
        </div>
        <div class="kb-cards" data-dropcol="${col.id}">${cardsHTML}</div>
        <div class="kb-add-wrap">
          <input class="kb-add-input" placeholder="Add card..." data-addcol="${col.id}"/>
          <button class="kb-add-btn" data-addbtn="${col.id}">Add</button>
        </div>
      </div>`;
  }).join('');

  document.getElementById('scroll-body').innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <div class="sec-hd" style="margin-bottom:0">${kb.cards.length} cards across ${kb.cols.length} columns</div>
      <button class="ghost-btn" id="add-col-btn" style="width:auto;padding:5px 14px">+ add column</button>
    </div>
    <div id="kanban-wrap">${colsHTML}</div>
  `;

  // Drag & drop
  let dragId=null;
  document.querySelectorAll('.kb-card').forEach(card=>{
    card.addEventListener('dragstart',e=>{dragId=card.dataset.cid;card.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
    card.addEventListener('dragend',()=>{card.classList.remove('dragging');document.querySelectorAll('.kb-col').forEach(c=>c.classList.remove('drag-over'));});
  });
  document.querySelectorAll('.kb-col').forEach(col=>{
    col.addEventListener('dragover',e=>{e.preventDefault();col.classList.add('drag-over');});
    col.addEventListener('dragleave',()=>col.classList.remove('drag-over'));
    col.addEventListener('drop',e=>{
      e.preventDefault();col.classList.remove('drag-over');
      const targetCol=col.dataset.col;
      const card=kb.cards.find(c=>c.id===dragId);
      if(card){card.col=targetCol;save();renderKanban();}
    });
  });

  // Delete cards
  document.querySelectorAll('.card-rm').forEach(btn=>{
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      kb.cards=kb.cards.filter(c=>c.id!==btn.dataset.rid);save();renderKanban();
    });
  });

  // Add cards
  document.querySelectorAll('[data-addbtn]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const col=btn.dataset.addbtn;
      const inp=document.querySelector(`[data-addcol="${col}"]`);
      const v=inp.value.trim();if(!v)return;
      kb.cards.push({id:'k_'+Date.now(),col,text:v,tag:''});
      inp.value='';save();renderKanban();
    });
  });
  document.querySelectorAll('[data-addcol]').forEach(inp=>{
    inp.addEventListener('keydown',e=>{
      if(e.key==='Enter'){
        const btn=document.querySelector(`[data-addbtn="${inp.dataset.addcol}"]`);
        if(btn)btn.click();
      }
    });
  });

  // Rename columns on click
  document.querySelectorAll('[data-rename]').forEach(el=>{
    el.addEventListener('dblclick',()=>{
      const colId=el.dataset.rename;
      const cur=el.textContent;
      const inp=document.createElement('input');
      inp.className='kb-col-rename';inp.value=cur;
      el.replaceWith(inp);inp.focus();inp.select();
      const commit=()=>{
        const nv=inp.value.trim()||cur;
        const col=kb.cols.find(c=>c.id===colId);
        if(col)col.title=nv;
        save();renderKanban();
      };
      inp.addEventListener('blur',commit);
      inp.addEventListener('keydown',e=>{if(e.key==='Enter')commit();if(e.key==='Escape'){inp.value=cur;commit();}});
    });
  });

  // Add column
  document.getElementById('add-col-btn').addEventListener('click',()=>{
    const title=prompt('Column name:');
    if(!title)return;
    kb.cols.push({id:'col_'+Date.now(),title});save();renderKanban();
  });
}

// ─── ANALYTICS ───────────────────────────────────────────────────────────────
function renderAnalytics(){
  const p=proj();
  const sb=document.getElementById('scroll-body');

  if(!p.gaPropertyId){
    sb.innerHTML=`
      <div class="ga-not-configured">
        <p>No GA4 property linked to this project.<br/>Add your Property ID in <strong>Configure</strong> to connect Google Analytics.</p>
        <button class="save-btn" onclick="switchToSetup()">Open Configure</button>
      </div>
      <div class="divider"></div>
      <div class="sec-hd">Setup guide</div>
      <div style="font-size:13px;color:var(--text2);line-height:1.8">
        <div style="margin-bottom:8px">1. Go to <strong style="color:var(--text)">Google Analytics → Admin → Property Settings</strong></div>
        <div style="margin-bottom:8px">2. Copy your <strong style="color:var(--text)">Property ID</strong> (numeric, e.g. 123456789)</div>
        <div style="margin-bottom:8px">3. Create a <strong style="color:var(--text)">Service Account</strong> in Google Cloud Console</div>
        <div style="margin-bottom:8px">4. Grant the service account <strong style="color:var(--text)">Viewer</strong> access in GA Admin → Account Access Management</div>
        <div style="margin-bottom:8px">5. Add <code style="background:var(--bg3);padding:2px 6px;border-radius:4px">GA_CLIENT_EMAIL</code> and <code style="background:var(--bg3);padding:2px 6px;border-radius:4px">GA_PRIVATE_KEY</code> as env vars in Netlify</div>
      </div>
    `;
    return;
  }

  const cacheKey=`${p.id}_${state.gaRange||'28daysAgo'}`;
  if(state.gaCache[cacheKey]){
    renderGAData(state.gaCache[cacheKey]);return;
  }

  sb.innerHTML=`<div class="ga-loading">// fetching analytics data...</div>`;
  fetchGA(p.gaPropertyId, state.gaRange||'28daysAgo', cacheKey);
}

async function fetchGA(propertyId, dateRange, cacheKey){
  try{
    const res=await fetch('/.netlify/functions/ga4',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({propertyId,dateRange})
    });
    const data=await res.json();
    if(data.error) throw new Error(data.error);
    state.gaCache[cacheKey]=data;
    renderGAData(data);
  }catch(err){
    document.getElementById('scroll-body').innerHTML=`
      <div class="ga-error">
        <strong>Analytics error:</strong> ${err.message}<br/><br/>
        Check that your GA_CLIENT_EMAIL and GA_PRIVATE_KEY env vars are set in Netlify,
        and that the service account has Viewer access to this property.
      </div>`;
  }
}

function renderGAData(data){
  const fmtDur=s=>{const m=Math.floor(s/60),sec=s%60;return m>0?`${m}m ${sec}s`:`${sec}s`;};
  const maxPV=Math.max(...(data.topPages||[]).map(r=>r.val),1);
  const maxEV=Math.max(...(data.topEvents||[]).map(r=>r.val),1);

  const rangeKey=state.gaRange||'28daysAgo';
  const ranges=[['7daysAgo','7 days'],['28daysAgo','28 days'],['90daysAgo','90 days']];

  document.getElementById('scroll-body').innerHTML=`
    <div class="ga-range-row">
      ${ranges.map(([k,l])=>`<button class="ga-range-btn${rangeKey===k?' on':''}" data-range="${k}">${l}</button>`).join('')}
      <div style="flex:1"></div>
      <button class="ga-range-btn" onclick="delete state.gaCache['${proj().id}_${rangeKey}'];renderAnalytics()">&#8635; Refresh</button>
    </div>
    <div class="ga-grid">
      <div class="ga-card"><div class="ga-label">Sessions</div><div class="ga-val">${data.sessions.toLocaleString()}</div></div>
      <div class="ga-card"><div class="ga-label">Active users</div><div class="ga-val">${data.activeUsers.toLocaleString()}</div></div>
      <div class="ga-card"><div class="ga-label">Avg duration</div><div class="ga-val">${fmtDur(+data.avgDuration)}</div></div>
      <div class="ga-card"><div class="ga-label">Bounce rate</div><div class="ga-val">${data.bounceRate}%</div></div>
    </div>
    <div class="row2" style="gap:16px">
      <div>
        <div class="sec-hd">Top pages</div>
        <table class="ga-table">
          <thead><tr><th>Page</th><th>Views</th></tr></thead>
          <tbody>${(data.topPages||[]).map(r=>`
            <tr><td>
              <div style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.dim}</div>
              <div class="ga-bar-wrap"><div class="ga-bar" style="width:${Math.round(r.val/maxPV*100)}%"></div></div>
            </td><td>${r.val.toLocaleString()}</td></tr>`).join('')}
          </tbody>
        </table>
      </div>
      <div>
        <div class="sec-hd">Top events</div>
        <table class="ga-table">
          <thead><tr><th>Event</th><th>Count</th></tr></thead>
          <tbody>${(data.topEvents||[]).map(r=>`
            <tr><td>
              <div style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.dim}</div>
              <div class="ga-bar-wrap"><div class="ga-bar" style="width:${Math.round(r.val/maxEV*100)}%"></div></div>
            </td><td>${r.val.toLocaleString()}</td></tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
  document.querySelectorAll('.ga-range-btn[data-range]').forEach(btn=>{
    btn.addEventListener('click',()=>{state.gaRange=btn.dataset.range;renderAnalytics();});
  });
}

// ─── SETUP / CONFIGURE ───────────────────────────────────────────────────────
function renderSetup(){
  const p=proj();
  const linksHTML=p.links.map((l,i)=>`
    <div class="url-row">
      <input value="${l.label}" placeholder="Label" data-li="${i}" data-f="label"/>
      <input value="${l.url}" placeholder="https://..." data-li="${i}" data-f="url"/>
      <button class="rm-btn" data-ri="${i}">&#215;</button>
    </div>`).join('');

  document.getElementById('scroll-body').innerHTML=`
    <div class="sec-hd">Project details</div>
    <div class="row2">
      <div class="fl"><label>Project name</label><input id="s-name" value="${p.label}"/></div>
      <div class="fl"><label>Status</label>
        <select id="s-status">
          <option value="bl|dl|Live"${p.badgeLabel==='Live'?' selected':''}>Live</option>
          <option value="bb|db|Building"${p.badgeLabel==='Building'?' selected':''}>Building</option>
          <option value="ba|da|Active"${p.badgeLabel==='Active'?' selected':''}>Active</option>
          <option value="bo|do|On Deck"${p.badgeLabel==='On Deck'?' selected':''}>On Deck</option>
        </select>
      </div>
    </div>
    <div class="fl"><label>Vertical</label>
      <select id="s-vert">
        ${['Services','Wellness','Games','Tools','Other'].map(v=>`<option${p.vertical===v?' selected':''}>${v}</option>`).join('')}
      </select>
    </div>
    <div class="fl"><label>Next action</label><input id="s-na" value="${p.nextAction}"/></div>
    <div class="divider"></div>
    <div class="sec-hd">Links & URLs</div>
    <div id="url-list">${linksHTML}</div>
    <button class="ghost-btn" id="add-link-btn">+ add link</button>
    <div class="divider"></div>
    <div class="sec-hd">Metrics (shown on overview)</div>
    ${p.metrics.map((m,i)=>`
    <div class="row2" style="margin-bottom:10px">
      <div class="fl"><label>Label ${i+1}</label><input value="${m.l}" data-mi="${i}" data-mf="l"/></div>
      <div class="fl"><label>Value ${i+1}</label><input value="${m.v}" data-mi="${i}" data-mf="v"/></div>
    </div>`).join('')}
    <div class="divider"></div>
    <div class="sec-hd">Google Analytics 4</div>
    <div class="fl">
      <label>GA4 Property ID</label>
      <input id="s-ga" placeholder="e.g. 123456789" value="${p.gaPropertyId||''}"/>
    </div>
    <div style="font-size:11px;color:var(--text3);font-family:'Space Mono',monospace;line-height:1.7;margin-bottom:16px">
      Find in GA → Admin → Property Settings → Property ID<br/>
      Requires GA_CLIENT_EMAIL + GA_PRIVATE_KEY env vars in Netlify
    </div>
    <div class="divider"></div>
    <button class="save-btn" id="save-setup-btn">Save setup</button>
    <button style="margin-left:12px;background:transparent;border:none;font-size:12px;color:var(--text3);cursor:pointer" onclick="toggleSetup()">Cancel</button>
  `;

  document.querySelectorAll('[data-li]').forEach(el=>{
    el.addEventListener('input',()=>{proj().links[+el.dataset.li][el.dataset.f]=el.value;});
  });
  document.querySelectorAll('[data-mi]').forEach(el=>{
    el.addEventListener('input',()=>{proj().metrics[+el.dataset.mi][el.dataset.mf]=el.value;});
  });
  document.querySelectorAll('.rm-btn[data-ri]').forEach(btn=>{
    btn.addEventListener('click',()=>{proj().links.splice(+btn.dataset.ri,1);save();renderSetup();});
  });
  document.getElementById('add-link-btn').addEventListener('click',()=>{
    proj().links.push({label:'',url:''});renderSetup();
    const rows=document.querySelectorAll('.url-row');
    rows[rows.length-1]?.querySelector('input')?.focus();
  });
  document.getElementById('save-setup-btn').addEventListener('click',()=>{
    const p=proj();
    p.label=document.getElementById('s-name').value||p.label;
    p.nextAction=document.getElementById('s-na').value||p.nextAction;
    p.vertical=document.getElementById('s-vert').value;
    p.gaPropertyId=document.getElementById('s-ga').value.trim();
    const sv=document.getElementById('s-status').value.split('|');
    p.badge=sv[0];p.dot=sv[1];p.badgeLabel=sv[2];
    save();state.setup=false;toast('Setup saved');render();
  });
}

function showAddProject(){
  state.setup=false;
  document.getElementById('pt').textContent='New project';
  document.getElementById('pb').textContent='';
  document.getElementById('tabs-row').innerHTML='';
  document.getElementById('cfg-btn').style.display='none';
  document.getElementById('scroll-body').innerHTML=`
    <div class="sec-hd">New project</div>
    <div class="row2">
      <div class="fl"><label>Project name</label><input id="np-name" placeholder="e.g. Proof"/></div>
      <div class="fl"><label>Vertical</label>
        <select id="np-vert">${['Services','Wellness','Games','Tools','Other'].map(v=>`<option>${v}</option>`).join('')}</select>
      </div>
    </div>
    <div class="fl"><label>Status</label>
      <select id="np-status">
        <option value="bb|db|Building" selected>Building</option>
        <option value="bl|dl|Live">Live</option>
        <option value="ba|da|Active">Active</option>
        <option value="bo|do|On Deck">On Deck</option>
      </select>
    </div>
    <div class="fl"><label>First next action</label><input id="np-na" placeholder="What moves this forward first?"/></div>
    <div class="divider"></div>
    <button class="save-btn" id="np-save">Create project</button>
    <button style="margin-left:12px;background:transparent;border:none;font-size:12px;color:var(--text3);cursor:pointer" id="np-cancel">Cancel</button>
  `;
  document.getElementById('np-cancel').addEventListener('click',()=>{document.getElementById('cfg-btn').style.display='';render();});
  document.getElementById('np-save').addEventListener('click',()=>{
    const name=document.getElementById('np-name').value.trim();
    if(!name){toast('Enter a project name');return;}
    const sv=document.getElementById('np-status').value.split('|');
    const id='p_'+Date.now();
    state.projects.push({
      id,label:name,
      vertical:document.getElementById('np-vert').value,
      dot:sv[1],badge:sv[0],badgeLabel:sv[2],
      gaPropertyId:'',
      metrics:[{l:'Status',v:sv[2]},{l:'Vertical',v:document.getElementById('np-vert').value},{l:'—',v:'—'},{l:'—',v:'—'}],
      nextAction:document.getElementById('np-na').value||'Define first milestone.',
      tasks:[{t:'Define concept + first milestone',d:false}],
      links:[],notes:'',
      kanban:{cols:[{id:'todo',title:'To Do'},{id:'inprog',title:'In Progress'},{id:'done',title:'Done'}],cards:[]}
    });
    state.active=id;state.tab='overview';state.setup=true;save();
    document.getElementById('cfg-btn').style.display='';
    render();toast('Project created — finish setup below');
  });
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function switchTab(t){state.tab=t;renderTopbar();renderBody();}
function switchToSetup(){state.setup=true;render();}
function toggleSetup(){state.setup=!state.setup;state.tab='overview';render();}

function renderBody(){
  if(state.setup){renderSetup();return;}
  if(state.tab==='tasks'){renderTasks();return;}
  if(state.tab==='kanban'){renderKanban();return;}
  if(state.tab==='analytics'){renderAnalytics();return;}
  if(state.tab==='notes'){renderNotes();return;}
  renderOverview();
}

function render(){renderNav();renderTopbar();renderBody();}
render();
</script>
