<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Nobody Studios HQ</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Inter:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --y:#F5C800;--yd:#8A6F00;--yb:#1a1400;
  --bg:#0d0d0d;--bg2:#161616;--bg3:#1e1e1e;--bg4:#272727;--bg5:#303030;
  --br:#252525;--br2:#353535;--br3:#454545;
  --tx:#e8e8e8;--tx2:#999;--tx3:#555;
  --green:#22c55e;--blue:#3b82f6;--red:#ef4444;--orange:#f97316;
  --sw:212px;--rad:8px;--radl:12px;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--tx);height:100vh;overflow:hidden;display:flex;flex-direction:column}
#app{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
#sidebar{width:var(--sw);background:var(--bg2);display:flex;flex-direction:column;border-right:1px solid var(--br);overflow-y:auto;flex-shrink:0}
#logo{padding:20px 16px 15px;border-bottom:1px solid var(--br);flex-shrink:0}
.wm{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.08em;color:var(--y);line-height:1}
.wmsub{font-family:'Space Mono',monospace;font-size:9px;color:var(--tx3);letter-spacing:.2em;margin-top:2px}
.nl{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.18em;color:var(--tx3);padding:14px 16px 5px;text-transform:uppercase}
.ni{display:flex;align-items:center;gap:9px;padding:9px 16px;cursor:pointer;font-size:13px;color:var(--tx2);border-left:2px solid transparent;user-select:none;transition:background .15s,color .15s,border-color .15s;position:relative}
.ni:hover{background:var(--bg3);color:var(--tx)}
.ni.active{color:var(--y);border-left-color:var(--y);background:var(--yb)}
.nd{width:7px;height:7px;border-radius:50%;flex-shrink:0;transition:transform .2s}
.ni:hover .nd{transform:scale(1.3)}
.dl{background:var(--green)}.db{background:var(--y)}.da{background:var(--blue)}.do{background:var(--tx3)}
.nicfg{margin-left:auto;width:5px;height:5px;border-radius:50%;background:var(--y);flex-shrink:0;animation:pulse 2s infinite}

/* STALE INDICATOR */
.ni-stale{margin-left:auto;font-family:'Space Mono',monospace;font-size:8px;color:var(--orange);letter-spacing:.04em;opacity:.8}
.ni-streak{margin-left:auto;font-family:'Space Mono',monospace;font-size:8px;color:var(--green);letter-spacing:.04em}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.niadd{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.1em;color:var(--tx3);padding:11px 16px;cursor:pointer;border-left:2px solid transparent;transition:all .15s}
.niadd:hover{color:var(--y);background:var(--bg3)}

/* HQ HOME BUTTON */
.ni-hq{display:flex;align-items:center;gap:9px;padding:10px 16px;cursor:pointer;font-size:12px;font-family:'Space Mono',monospace;letter-spacing:.06em;color:var(--y);border-left:2px solid transparent;border-bottom:1px solid var(--br);background:var(--yb);user-select:none;transition:all .15s}
.ni-hq:hover{background:rgba(245,200,0,.12)}
.ni-hq.active{border-left-color:var(--y)}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
#topbar{padding:16px 24px 0;border-bottom:1px solid var(--br);background:var(--bg2);flex-shrink:0}
.tbtop{display:flex;align-items:center;gap:10px;padding-bottom:12px}
#pt{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:.06em;flex:1;cursor:pointer;border-bottom:1px solid transparent;transition:border-color .15s;outline:none}
#pt:hover{border-bottom-color:var(--br2)}
#pt:focus{border-bottom-color:var(--y);outline:none}
.sbadge{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:4px 9px;border-radius:4px;cursor:pointer;transition:opacity .15s}
.sbadge:hover{opacity:.75}
.bl{background:#052e16;color:#4ade80}.bb{background:#1c1100;color:#fbbf24}.ba{background:#0c1a3d;color:#60a5fa}.bo{background:var(--bg3);color:var(--tx3)}
.cfgbtn{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.08em;padding:5px 12px;border-radius:var(--rad);border:1px solid var(--br2);background:transparent;color:var(--tx2);cursor:pointer;transition:all .15s}
.cfgbtn:hover{border-color:var(--y);color:var(--y)}
.cfgbtn.done{border-color:#14532d;color:var(--green)}
.tabs{display:flex}
.tab{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:10px 15px;cursor:pointer;color:var(--tx3);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;user-select:none}
.tab:hover{color:var(--tx2)}
.tab.on{color:var(--y);border-bottom-color:var(--y)}

/* SCROLL */
#scroll-body{flex:1;overflow-y:auto;padding:22px 24px}
#scroll-body::-webkit-scrollbar{width:4px}
#scroll-body::-webkit-scrollbar-thumb{background:var(--br2);border-radius:2px}

/* FORM */
input,textarea,select{font-family:'Inter',sans-serif;font-size:13px;color:var(--tx);background:var(--bg3);border:1px solid var(--br2);border-radius:var(--rad);padding:8px 11px;width:100%;outline:none;transition:border-color .15s,box-shadow .15s}
input:focus,textarea:focus,select:focus{border-color:var(--y);box-shadow:0 0 0 2px rgba(245,200,0,.08)}
textarea{resize:vertical;min-height:72px;line-height:1.55}
select option{background:var(--bg3)}
.fl{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.fl label,.sechd{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--tx3)}
.sechd{margin-bottom:10px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.divider{height:1px;background:var(--br);margin:20px 0}
.savebtn{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.1em;padding:9px 20px;border-radius:var(--rad);border:none;background:var(--y);color:#111;cursor:pointer;font-weight:700;transition:opacity .15s,transform .1s}
.savebtn:hover{opacity:.85}.savebtn:active{transform:scale(.97)}
.ghostbtn{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.08em;background:transparent;border:1px dashed var(--br2);border-radius:var(--rad);padding:7px 14px;color:var(--tx3);cursor:pointer;width:100%;transition:all .15s;margin-top:4px}
.ghostbtn:hover{border-color:var(--y);color:var(--y)}
.rmbtn{width:28px;height:28px;border-radius:var(--rad);border:1px solid var(--br);background:transparent;cursor:pointer;color:var(--tx3);font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.rmbtn:hover{border-color:var(--red);color:var(--red);background:rgba(239,68,68,.08)}
.editbtn{width:26px;height:26px;border-radius:var(--rad);border:1px solid transparent;background:transparent;cursor:pointer;color:var(--tx3);font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.editbtn:hover{border-color:var(--br2);color:var(--tx)}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.anim-fade-up{animation:fadeUp .22s var(--ease) both}
.anim-fade-in{animation:fadeIn .18s both}
.anim-scale-in{animation:scaleIn .2s var(--ease) both}
:root{--ease:cubic-bezier(.25,.1,.25,1)}

/* METRICS */
.mrow{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:20px}
.mc{background:var(--bg2);border:1px solid var(--br);border-radius:var(--radl);padding:13px 15px;cursor:pointer;transition:border-color .15s,transform .15s;position:relative}
.mc:hover{border-color:var(--br2);transform:translateY(-1px)}
.mc .ml{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--tx3);margin-bottom:5px}
.mc .mv{font-size:20px;font-weight:500;color:var(--tx)}
.mc .medit{position:absolute;top:8px;right:8px;opacity:0;transition:opacity .15s}
.mc:hover .medit{opacity:1}

/* NA BLOCK */
.nablock{background:var(--bg2);border-radius:var(--radl);padding:14px 16px;margin-bottom:20px;border-left:3px solid var(--y);cursor:pointer;transition:border-color .15s}
.nablock:hover{border-left-color:rgba(245,200,0,.5)}
.nal{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--yd);margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}
.nat{font-size:13px;color:var(--tx);line-height:1.55}

/* LINKS */
.lrow{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:20px}
.lchip{display:inline-flex;align-items:center;gap:5px;padding:6px 11px;border-radius:var(--rad);border:1px solid var(--br2);font-family:'Space Mono',monospace;font-size:10px;color:var(--tx2);background:var(--bg2);text-decoration:none;letter-spacing:.05em;transition:all .15s}
.lchip:hover{border-color:var(--y);color:var(--y)}
.lchip-rm{background:none;border:none;cursor:pointer;color:var(--tx3);font-size:13px;padding:0 0 0 4px;line-height:1;transition:color .15s;display:none}
.lchip:hover .lchip-rm{display:inline}
.lchip-rm:hover{color:var(--red)}

/* TASKS */
.progwrap{height:3px;background:var(--bg3);border-radius:2px;margin-bottom:18px;overflow:hidden}
.progbar{height:100%;background:var(--y);border-radius:2px;transition:width .4s var(--ease)}
.proglbl{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.1em;color:var(--tx3);margin-bottom:6px}
.tlist{display:flex;flex-direction:column;gap:5px}
.trow{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--rad);border:1px solid var(--br);font-size:13px;color:var(--tx);background:var(--bg2);transition:border-color .15s,opacity .2s,transform .15s}
.trow:hover{border-color:var(--br2)}
.trow.done{color:var(--tx3);text-decoration:line-through;opacity:.6}
.trow.overdue{border-color:rgba(239,68,68,.3);background:rgba(239,68,68,.04)}
.trow.due-soon{border-color:rgba(249,115,22,.3);background:rgba(249,115,22,.04)}
.trow .tactions{display:flex;gap:4px;margin-left:auto;opacity:0;transition:opacity .15s}
.trow:hover .tactions{opacity:1}
.tck{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--br2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;cursor:pointer;transition:all .2s}
.tck.on{background:var(--y);border-color:var(--y);color:#111;animation:scaleIn .15s var(--ease)}
.tinline{flex:1;background:transparent;border:none;font-size:13px;color:var(--tx);padding:0;outline:none;font-family:'Inter',sans-serif}
.tinline:focus{outline:none}
.due-badge{font-family:'Space Mono',monospace;font-size:9px;padding:2px 6px;border-radius:3px;white-space:nowrap;flex-shrink:0}
.due-badge.overdue{background:rgba(239,68,68,.15);color:#fca5a5}
.due-badge.due-soon{background:rgba(249,115,22,.15);color:#fdba74}
.due-badge.future{background:rgba(59,130,246,.1);color:#93c5fd}
.due-badge.done-badge{background:rgba(34,197,94,.1);color:#86efac}

/* NOTES */
.note-card{background:var(--bg2);border:1px solid var(--br);border-radius:var(--radl);padding:14px 16px;margin-bottom:10px;transition:border-color .15s,transform .15s;cursor:pointer}
.note-card:hover{border-color:var(--br2);transform:translateY(-1px)}
.note-hd{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px}
.note-title{font-size:13px;font-weight:500;color:var(--tx);flex:1}
.note-actions{display:flex;gap:4px;opacity:0;transition:opacity .15s;flex-shrink:0}
.note-card:hover .note-actions{opacity:1}
.note-body{font-size:12px;color:var(--tx2);line-height:1.6;white-space:pre-wrap}
.note-date{font-family:'Space Mono',monospace;font-size:9px;color:var(--tx3);margin-top:8px;letter-spacing:.06em}
.note-editor{background:var(--bg2);border:1px solid var(--y);border-radius:var(--radl);padding:16px;margin-bottom:14px;animation:scaleIn .18s var(--ease)}
.note-editor input{margin-bottom:8px;font-weight:500}
.note-editor textarea{min-height:100px}
.note-editor-actions{display:flex;gap:8px;margin-top:10px}
.cancelbtn{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.08em;padding:7px 14px;border-radius:var(--rad);border:1px solid var(--br2);background:transparent;color:var(--tx3);cursor:pointer;transition:all .15s}
.cancelbtn:hover{border-color:var(--br3);color:var(--tx2)}

/* KANBAN */
#kbwrap{display:flex;gap:12px;align-items:flex-start;padding-bottom:12px;overflow-x:auto;min-height:320px}
#kbwrap::-webkit-scrollbar{height:4px}
#kbwrap::-webkit-scrollbar-thumb{background:var(--br2);border-radius:2px}
.kbcol{min-width:220px;width:220px;background:var(--bg2);border-radius:var(--radl);border:1px solid var(--br);display:flex;flex-direction:column;flex-shrink:0;transition:border-color .15s}
.kbcol.dragover{border-color:var(--y);background:var(--yb)}
.kbcolhd{display:flex;align-items:center;justify-content:space-between;padding:11px 13px 9px;border-bottom:1px solid var(--br)}
.kbcoltitle{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--tx2);flex:1;cursor:text;outline:none;background:transparent;border:none}
.kbcoltitle:focus{color:var(--y)}
.kbcnt{font-family:'Space Mono',monospace;font-size:9px;color:var(--tx3);background:var(--bg3);padding:2px 6px;border-radius:10px}
.kbcol-actions{display:flex;gap:4px;opacity:0;transition:opacity .15s}
.kbcol:hover .kbcol-actions{opacity:1}
.kbcards{flex:1;padding:9px;display:flex;flex-direction:column;gap:7px;min-height:48px}
.kbcard{background:var(--bg3);border:1px solid var(--br);border-radius:var(--rad);padding:10px 12px;cursor:pointer;font-size:12px;color:var(--tx);line-height:1.5;transition:border-color .15s,transform .15s,box-shadow .15s;position:relative}
.kbcard:hover{border-color:var(--br2);transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.3)}
.kbcard.dragging{opacity:.3;transform:scale(.96);cursor:grabbing}
.kbcard-tag{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:.1em;padding:2px 6px;border-radius:3px;margin-bottom:6px;display:inline-block;text-transform:uppercase}
.tag-bug{background:rgba(239,68,68,.15);color:#fca5a5}
.tag-feat{background:rgba(59,130,246,.15);color:#93c5fd}
.tag-idea{background:rgba(168,85,247,.15);color:#d8b4fe}
.tag-content{background:rgba(34,197,94,.15);color:#86efac}
.tag-none{display:none}
.kbcard-footer{display:flex;align-items:center;justify-content:space-between;margin-top:7px;gap:6px}
.kbcard-meta{font-family:'Space Mono',monospace;font-size:9px;color:var(--tx3);letter-spacing:.04em}
.kbcard-checks{font-family:'Space Mono',monospace;font-size:9px;color:var(--tx3)}
.kbaddwrap{padding:0 9px 9px}
.kbaddinput{font-size:12px;padding:7px 10px}
.kbaddbtn{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.08em;padding:6px;border-radius:var(--rad);border:none;background:var(--y);color:#111;cursor:pointer;font-weight:700;width:100%;margin-top:5px;transition:opacity .15s}
.kbaddbtn:hover{opacity:.85}

/* CARD DRAWER */
#drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:none;animation:fadeIn .2s}
#drawer-overlay.open{display:block}
#drawer{position:fixed;right:0;top:0;bottom:0;width:420px;background:var(--bg2);border-left:1px solid var(--br);z-index:101;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s var(--ease)}
#drawer.open{transform:translateX(0)}
#drawer-hd{padding:18px 20px;border-bottom:1px solid var(--br);display:flex;align-items:center;gap:10px;flex-shrink:0}
#drawer-title{font-size:16px;font-weight:500;flex:1;background:transparent;border:none;color:var(--tx);outline:none;font-family:'Inter',sans-serif}
#drawer-title:focus{border-bottom:1px solid var(--y)}
#drawer-body{flex:1;overflow-y:auto;padding:18px 20px}
#drawer-body::-webkit-scrollbar{width:4px}
#drawer-body::-webkit-scrollbar-thumb{background:var(--br2);border-radius:2px}
.drawer-section{margin-bottom:20px}
.drawer-sechd{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--tx3);margin-bottom:8px}
.drawer-desc{font-size:13px;line-height:1.6;color:var(--tx2);background:var(--bg3);border:1px solid var(--br2);border-radius:var(--rad);padding:10px 12px;min-height:80px}
.drawer-tag-row{display:flex;gap:6px;flex-wrap:wrap}
.drawer-tag{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.08em;text-transform:uppercase;padding:5px 10px;border-radius:var(--rad);border:1px solid var(--br2);cursor:pointer;transition:all .15s;color:var(--tx3);background:transparent}
.drawer-tag.on{border-color:var(--y);color:var(--y);background:var(--yb)}
.drawer-checklist{display:flex;flex-direction:column;gap:5px}
.dcheck-row{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--rad);border:1px solid var(--br);background:var(--bg3);transition:border-color .15s}
.dcheck-row:hover{border-color:var(--br2)}
.dcheck-row .tck{width:14px;height:14px}
.dcheck-lbl{font-size:12px;flex:1;background:transparent;border:none;color:var(--tx);outline:none;font-family:'Inter',sans-serif}
.dcheck-lbl.done{text-decoration:line-through;color:var(--tx3)}
.media-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px}
.media-thumb{aspect-ratio:1;border-radius:var(--rad);border:1px solid var(--br);overflow:hidden;position:relative;cursor:pointer;transition:border-color .15s}
.media-thumb:hover{border-color:var(--br2)}
.media-thumb img{width:100%;height:100%;object-fit:cover}
.media-thumb .mthumb-rm{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.7);border:none;border-radius:4px;color:var(--tx);cursor:pointer;width:20px;height:20px;font-size:11px;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s}
.media-thumb:hover .mthumb-rm{opacity:1}
.upload-btn{border:1px dashed var(--br2);border-radius:var(--rad);padding:12px;text-align:center;cursor:pointer;transition:all .15s;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.08em;color:var(--tx3)}
.upload-btn:hover{border-color:var(--y);color:var(--y)}
#drawer-footer{padding:14px 20px;border-top:1px solid var(--br);display:flex;gap:8px;flex-shrink:0}

/* GA */
.gagrid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:20px}
.gacard{background:var(--bg2);border:1px solid var(--br);border-radius:var(--radl);padding:13px 15px;animation:fadeUp .2s both}
.gacard:nth-child(1){animation-delay:.05s}.gacard:nth-child(2){animation-delay:.1s}.gacard:nth-child(3){animation-delay:.15s}.gacard:nth-child(4){animation-delay:.2s}
.galabel{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--tx3);margin-bottom:5px}
.gaval{font-size:22px;font-weight:500;color:var(--tx)}
.gatable{width:100%;border-collapse:collapse;font-size:12px}
.gatable th{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--tx3);text-align:left;padding:0 0 8px;border-bottom:1px solid var(--br)}
.gatable td{padding:7px 0;border-bottom:1px solid var(--br);color:var(--tx2)}
.gatable td:last-child{text-align:right;color:var(--tx);font-weight:500}
.gatable tr:last-child td{border-bottom:none}
.gabar-wrap{height:2px;background:var(--bg3);border-radius:2px;margin-top:3px}
.gabar{height:100%;background:var(--y);border-radius:2px}
.garange-row{display:flex;gap:6px;margin-bottom:18px}
.garange-btn{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.08em;padding:5px 10px;border-radius:var(--rad);border:1px solid var(--br);background:transparent;color:var(--tx3);cursor:pointer;transition:all .15s}
.garange-btn:hover,.garange-btn.on{border-color:var(--y);color:var(--y)}
.ganotcfg{background:var(--bg2);border:1px dashed var(--br2);border-radius:var(--radl);padding:28px;text-align:center}
.ganotcfg p{font-size:13px;color:var(--tx2);line-height:1.7;margin-bottom:14px}
.gasetup-steps{font-size:12px;color:var(--tx2);line-height:1.9;text-align:left;margin-top:16px}
code{background:var(--bg3);padding:2px 6px;border-radius:4px;font-size:11px;font-family:'Space Mono',monospace;color:var(--tx2)}

/* STATUS PICKER */
.statuspicker{display:flex;gap:6px;flex-wrap:wrap}
.sp-opt{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.08em;text-transform:uppercase;padding:5px 10px;border-radius:var(--rad);border:1px solid var(--br2);cursor:pointer;transition:all .15s;color:var(--tx3);background:transparent}
.sp-opt.on{border-color:var(--y);color:var(--y);background:var(--yb)}

/* TOAST */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--bg4);border:1px solid var(--br2);border-radius:var(--rad);padding:9px 18px;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.08em;color:var(--tx);opacity:0;transition:all .22s;pointer-events:none;z-index:999;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* INLINE EDIT */
.inlineedit{background:transparent;border:none;border-bottom:1px solid var(--br2);border-radius:0;padding:2px 4px;color:inherit;font:inherit;width:100%;outline:none;transition:border-color .15s}
.inlineedit:focus{border-bottom-color:var(--y)}

/* ── FEATURE 1: GLOBAL DAILY FOCUS ──────────────────────────────────────── */
.focus-hero{background:linear-gradient(135deg,var(--yb) 0%,var(--bg2) 100%);border:1px solid rgba(245,200,0,.2);border-radius:var(--radl);padding:18px 20px;margin-bottom:20px;position:relative;overflow:hidden}
.focus-hero::before{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;border-radius:50%;background:radial-gradient(circle,rgba(245,200,0,.06) 0%,transparent 70%)}
.focus-hero-hd{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:.1em;color:var(--y);margin-bottom:4px}
.focus-hero-sub{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.14em;color:var(--tx3);margin-bottom:14px}
.focus-action-list{display:flex;flex-direction:column;gap:7px}
.focus-action-row{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:var(--rad);background:var(--bg3);border:1px solid var(--br);transition:border-color .15s,transform .1s;cursor:pointer}
.focus-action-row:hover{border-color:var(--br2);transform:translateX(2px)}
.focus-proj-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:4px}
.focus-proj-name{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.1em;color:var(--tx3);margin-bottom:3px}
.focus-action-text{font-size:12px;color:var(--tx);line-height:1.5;flex:1}
.focus-goto{font-family:'Space Mono',monospace;font-size:9px;color:var(--tx3);flex-shrink:0;padding-top:2px;opacity:0;transition:opacity .15s}
.focus-action-row:hover .focus-goto{opacity:1}

/* ── FEATURE 2: DUE DATE PICKER ─────────────────────────────────────────── */
input[type="date"]{color-scheme:dark;font-size:11px;padding:5px 8px}
.due-row{display:flex;align-items:center;gap:6px}
.due-input{width:auto;flex-shrink:0;font-size:11px;padding:4px 8px}

/* ── FEATURE 3: STALENESS + STREAK ─────────────────────────────────────── */
.proj-health-row{display:flex;gap:6px;margin-top:3px;flex-wrap:wrap}
.health-chip{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:.06em;padding:2px 6px;border-radius:3px}
.health-stale{background:rgba(249,115,22,.12);color:#fdba74}
.health-fresh{background:rgba(34,197,94,.1);color:#86efac}
.health-streak{background:rgba(59,130,246,.1);color:#93c5fd}

/* ── FEATURE 4: GLOBAL SEARCH ───────────────────────────────────────────── */
#search-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:flex-start;justify-content:center;padding-top:15vh;animation:fadeIn .15s}
#search-overlay.open{display:flex}
#search-box{width:560px;background:var(--bg2);border:1px solid var(--y);border-radius:var(--radl);overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,.6);animation:scaleIn .18s var(--ease)}
#search-input{width:100%;background:transparent;border:none;padding:16px 20px;font-size:16px;color:var(--tx);font-family:'Inter',sans-serif;outline:none;border-bottom:1px solid var(--br)}
#search-input::placeholder{color:var(--tx3)}
#search-results{max-height:360px;overflow-y:auto;padding:6px}
#search-results::-webkit-scrollbar{width:4px}
#search-results::-webkit-scrollbar-thumb{background:var(--br2);border-radius:2px}
.search-result{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-radius:var(--rad);cursor:pointer;transition:background .12s}
.search-result:hover{background:var(--bg3)}
.search-result-type{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--tx3);flex-shrink:0;width:40px;padding-top:2px}
.search-result-proj{font-family:'Space Mono',monospace;font-size:8px;color:var(--tx3);flex-shrink:0;width:80px;padding-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.search-result-text{font-size:13px;color:var(--tx);flex:1;line-height:1.4}
.search-result-text mark{background:rgba(245,200,0,.25);color:var(--y);border-radius:2px;padding:0 2px}
.search-empty{padding:24px;text-align:center;font-family:'Space Mono',monospace;font-size:11px;color:var(--tx3);letter-spacing:.08em}
.search-hint{padding:10px 14px;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.08em;color:var(--tx3);border-top:1px solid var(--br);display:flex;justify-content:space-between}

/* ── FEATURE 5: WEEKLY REVIEW ───────────────────────────────────────────── */
#review-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:none;align-items:center;justify-content:center;animation:fadeIn .2s}
#review-overlay.open{display:flex}
#review-modal{width:540px;max-height:80vh;background:var(--bg2);border:1px solid var(--br2);border-radius:var(--radl);overflow:hidden;display:flex;flex-direction:column;animation:scaleIn .2s var(--ease);box-shadow:0 32px 80px rgba(0,0,0,.7)}
#review-hd{padding:20px 24px;border-bottom:1px solid var(--br);background:var(--yb);flex-shrink:0}
.review-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.08em;color:var(--y)}
.review-sub{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.14em;color:var(--tx3);margin-top:2px}
#review-body{flex:1;overflow-y:auto;padding:20px 24px}
#review-body::-webkit-scrollbar{width:4px}
#review-body::-webkit-scrollbar-thumb{background:var(--br2);border-radius:2px}
#review-footer{padding:14px 24px;border-top:1px solid var(--br);display:flex;gap:8px;align-items:center;flex-shrink:0}
.review-progress{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.1em;color:var(--tx3);flex:1}
.review-proj-card{border:1px solid var(--br);border-radius:var(--radl);padding:16px;margin-bottom:14px;transition:border-color .15s}
.review-proj-card.current{border-color:var(--y);background:var(--yb)}
.review-proj-name{font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:.06em;color:var(--tx);margin-bottom:4px}
.review-na-label{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.12em;color:var(--tx3);text-transform:uppercase;margin-bottom:5px}
.review-na-text{font-size:13px;color:var(--tx2);line-height:1.5;margin-bottom:12px}
.review-actions{display:flex;gap:6px}
.review-btn{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.08em;padding:6px 12px;border-radius:var(--rad);border:1px solid var(--br2);background:transparent;color:var(--tx3);cursor:pointer;transition:all .15s}
.review-btn:hover{border-color:var(--y);color:var(--y)}
.review-btn.primary{background:var(--y);color:#111;border-color:var(--y)}
.review-btn.primary:hover{opacity:.85}
.review-edit-wrap{margin-top:10px;display:none}
.review-edit-wrap.open{display:block}

/* STREAK DISPLAY IN SIDEBAR */
.streak-bar{padding:10px 16px 12px;border-top:1px solid var(--br);flex-shrink:0}
.streak-label{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--tx3);margin-bottom:6px}
.streak-dots{display:flex;gap:4px}
.streak-dot{width:12px;height:12px;border-radius:3px;background:var(--bg3);border:1px solid var(--br)}
.streak-dot.active{background:var(--y);border-color:var(--y)}
.streak-dot.today{box-shadow:0 0 6px rgba(245,200,0,.4)}

/* SEARCH SHORTCUT HINT */
.search-trigger{display:flex;align-items:center;gap:8px;padding:9px 16px;cursor:pointer;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.08em;color:var(--tx3);border-bottom:1px solid var(--br);transition:all .15s}
.search-trigger:hover{color:var(--y);background:var(--bg3)}
.search-trigger kbd{font-size:9px;padding:2px 5px;border-radius:3px;border:1px solid var(--br2);background:var(--bg3);color:var(--tx3)}
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div id="logo"><div class="wm">Nobody</div><div class="wmsub">Studios // HQ</div></div>
    <!-- Search trigger -->
    <div class="search-trigger" id="search-trigger-btn" title="Search everything (Cmd+K)">
      ⌕ Search <kbd>⌘K</kbd>
    </div>
    <!-- HQ Home -->
    <div class="ni-hq" id="hq-home-btn">⬡ Daily Focus</div>
    <div id="nav-body"></div>
    <!-- Streak bar -->

  </div>
  <div id="main">
    <div id="topbar">
      <div class="tbtop">

      </div>

</div>

<!-- Kanban card drawer -->

<div id="drawer">

  <div id="drawer-body"></div>

</div>

<!-- FEATURE 4: Global Search Overlay -->
<div id="search-overlay" onclick="e=>e.target===this&&closeSearch()">
  <div id="search-box">
    <input id="search-input" placeholder="Search tasks, notes, cards..." autocomplete="off"/>
    <div id="search-results"></div>
    <div class="search-hint">
      <span>↑↓ navigate &nbsp;·&nbsp; Enter to go &nbsp;·&nbsp; Esc to close</span>
      <span>searching across all projects</span>
    </div>
  </div>
</div>

<!-- FEATURE 5: Weekly Review Modal -->
<div id="review-overlay">
  <div id="review-modal">
    <div id="review-hd">
      <div class="review-title">Weekly Review</div>
      <div class="review-sub" id="review-sub-text">Loading...</div>
    </div>
    <div id="review-body"></div>
    <div id="review-footer">
      <div class="review-progress" id="review-progress"></div>
      <button class="review-btn" onclick="closeReview()">Close</button>
      <button class="review-btn primary" id="review-next-btn">Next →</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ─── DEFAULTS ────────────────────────────────────────────────────────────────
const DEFS=[
  {id:'content',label:'Content & Video',vertical:'Services',dot:'da',badge:'ba',badgeLabel:'Active',gaPropertyId:'',
   metrics:[{l:'Active clients',v:'—'},{l:'In flight',v:'—'},{l:'Est. MRR',v:'—'},{l:'Leads',v:'—'}],
   nextAction:'Define service tiers and build a client-facing rate card.',
   tasks:[{id:'t1',t:'Finalize service pricing tiers',d:false,due:''},{id:'t2',t:'Build content strategy portfolio page',d:false,due:''},{id:'t3',t:'Write case study — Zoo social growth',d:false,due:''}],
   links:[],notes:[],
   kanban:{cols:[{id:'todo',title:'To Do'},{id:'inprog',title:'In Progress'},{id:'done',title:'Done'}],
     cards:[{id:'kc1',col:'todo',title:'Rate card design',desc:'',tag:'',checklist:[],media:[]},{id:'kc2',col:'todo',title:'Portfolio page copy',desc:'',tag:'',checklist:[],media:[]}]}
  },
  {id:'steady',label:'Steady',vertical:'Wellness',dot:'dl',badge:'bl',badgeLabel:'Live',gaPropertyId:'',
   metrics:[{l:'Status',v:'Live'},{l:'Platform',v:'PWA'},{l:'Last deploy',v:'Recent'},{l:'Users',v:'—'}],
   nextAction:'Beta feedback pass — onboarding + custom foods on mobile.',
   tasks:[{id:'t4',t:'Beta feedback survey',d:false,due:''},{id:'t5',t:'Onboarding A/B test',d:false,due:''},{id:'t6',t:'Fast food guide — expand entries',d:false,due:''}],
   links:[],notes:[],
   kanban:{cols:[{id:'todo',title:'To Do'},{id:'inprog',title:'In Progress'},{id:'done',title:'Done'}],
     cards:[{id:'kc3',col:'inprog',title:'Onboarding rebuild',desc:'',tag:'feat',checklist:[],media:[]}]}
  },
  {id:'grind',label:'GRIND',vertical:'Wellness',dot:'dl',badge:'bl',badgeLabel:'Live',gaPropertyId:'',
   metrics:[{l:'Status',v:'Live'},{l:'Exercises',v:'110+'},{l:'Storage',v:'Local'},{l:'Users',v:'—'}],
   nextAction:'Cloud sync decision — local-only vs Firestore.',
   tasks:[{id:'t7',t:'Cloud sync decision',d:false,due:''},{id:'t8',t:'Progressive overload UX',d:false,due:''}],
   links:[],notes:[],
   kanban:{cols:[{id:'todo',title:'To Do'},{id:'inprog',title:'In Progress'},{id:'done',title:'Done'}],cards:[]}
  },
  {id:'plottwisted',label:'Plot Twisted',vertical:'Games',dot:'dl',badge:'bl',badgeLabel:'Live',gaPropertyId:'',
   metrics:[{l:'Mode',v:'Daily+'},{l:'Multiplayer',v:'Pass & Play'},{l:'Clue DB',v:'Growing'},{l:'Users',v:'—'}],
   nextAction:'Launch marketing — short-form gameplay clips for TikTok/Reels.',
   tasks:[{id:'t9',t:'Record gameplay clips',d:false,due:''},{id:'t10',t:'App Store description',d:false,due:''},{id:'t11',t:'Expand clue database',d:false,due:''}],
   links:[],notes:[],
   kanban:{cols:[{id:'todo',title:'To Do'},{id:'inprog',title:'In Progress'},{id:'done',title:'Done'}],
     cards:[{id:'kc4',col:'inprog',title:'Daily Challenge polish',desc:'',tag:'feat',checklist:[],media:[]}]}
  },
  {id:'postiq',label:'PostIQ',vertical:'Tools',dot:'db',badge:'bb',badgeLabel:'Building',gaPropertyId:'',
   metrics:[{l:'Deployed',v:'Yes'},{l:'Auth',v:'Firebase'},{l:'Proxy',v:'Netlify Fn'},{l:'Users',v:'—'}],
   nextAction:'Polish Trending view + Thumbnail mgmt. Then Buffer community post.',
   tasks:[{id:'t12',t:'Trending view — finalize filters',d:false,due:''},{id:'t13',t:'Thumbnail management — mobile test',d:false,due:''},{id:'t14',t:'Buffer community announcement',d:false,due:''},{id:'t15',t:'Landing page refresh',d:true,due:''}],
   links:[{id:'l1',label:'App',url:'https://ccpostiq.netlify.app'}],
   notes:[],
   kanban:{cols:[{id:'todo',title:'To Do'},{id:'inprog',title:'In Progress'},{id:'done',title:'Done'}],
     cards:[{id:'kc5',col:'inprog',title:'Trending view filters',desc:'',tag:'feat',checklist:[],media:[]},{id:'kc6',col:'done',title:'Landing page copy',desc:'',tag:'',checklist:[],media:[]}]}
  },
];

// ─── STATE ────────────────────────────────────────────────────────────────────
const S={
  projects:load(),
  active:'content',tab:'overview',setup:false,view:'project',
  gaCache:{},gaRange:'28daysAgo',
  drawerCardId:null,
  reviewStep:0,
};

function load(){
  try{
    const s=localStorage.getItem('ns_hq_v4');
    if(s){
      const p=JSON.parse(s);
      DEFS.forEach(d=>{if(!p.find(x=>x.id===d.id))p.push(JSON.parse(JSON.stringify(d)));});
      p.forEach(proj=>{
        if(!proj.notes)proj.notes=[];
        if(!proj.kanban)proj.kanban={cols:[{id:'todo',title:'To Do'},{id:'inprog',title:'In Progress'},{id:'done',title:'Done'}],cards:[]};
        proj.kanban.cards.forEach(c=>{
          if(!c.checklist)c.checklist=[];
          if(!c.media)c.media=[];
          if(!c.id)c.id='kc_'+Math.random().toString(36).slice(2);
        });
        proj.tasks.forEach(t=>{if(!t.due)t.due='';});
        // migrate lastActivity
        if(!proj.lastActivity)proj.lastActivity=null;
      });
      return p;
    }
  }catch(e){}
  return DEFS.map(d=>JSON.parse(JSON.stringify(d)));
}

function save(){
  localStorage.setItem('ns_hq_v4',JSON.stringify(S.projects));
}
function p(){return S.projects.find(x=>x.id===S.active);}
function uid(){return '_'+Math.random().toString(36).slice(2,9);}
function toast(msg,dur=1800){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),dur);
}
function stagger(selector,cls='anim-fade-up',delay=50){
  document.querySelectorAll(selector).forEach((el,i)=>{
    el.style.animationDelay=`${i*delay}ms`;el.classList.add(cls);
  });
}
function now(){
  return new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}

// ─── FEATURE 5: STREAK TRACKING ──────────────────────────────────────────────
function todayStr(){return new Date().toISOString().slice(0,10);}

function recordVisit(){
  const key='ns_hq_streak';
  let data;
  try{data=JSON.parse(localStorage.getItem(key))||{};}catch(e){data={};}
  data.days=data.days||[];
  const today=todayStr();
  if(!data.days.includes(today))data.days.push(today);
  // keep last 30 days
  data.days=data.days.slice(-30);
  data.lastReview=data.lastReview||null;
  localStorage.setItem(key,JSON.stringify(data));
  return data;
}

function getStreakData(){
  let data;
  try{data=JSON.parse(localStorage.getItem('ns_hq_streak'))||{};}catch(e){data={};}
  data.days=data.days||[];
  return data;
}

function calcStreak(days){
  if(!days.length)return 0;
  const sorted=[...new Set(days)].sort().reverse();
  const today=todayStr();
  let streak=0;
  let check=today;
  for(let i=0;i<sorted.length;i++){
    if(sorted[i]===check){streak++;const d=new Date(check);d.setDate(d.getDate()-1);check=d.toISOString().slice(0,10);}
    else if(sorted[i]<check)break;
  }
  return streak;
}

function renderStreakBar(){
  const data=getStreakData();
  const streak=calcStreak(data.days);
  const today=todayStr();
  // show last 7 days
  const dots=[];
  for(let i=6;i>=0;i--){
    const d=new Date();d.setDate(d.getDate()-i);
    const ds=d.toISOString().slice(0,10);
    dots.push({ds,active:data.days.includes(ds),isToday:ds===today});
  }
  document.getElementById('streak-bar').innerHTML=`
    <div class="streak-label">Streak — ${streak} day${streak!==1?'s':''}</div>
    <div class="streak-dots">${dots.map(d=>`<div class="streak-dot${d.active?' active':''}${d.isToday?' today':''}" title="${d.ds}"></div>`).join('')}</div>
  `;
}

// ─── STALENESS CHECK ──────────────────────────────────────────────────────────
function daysSince(iso){
  if(!iso)return null;
  const ms=Date.now()-new Date(iso).getTime();
  return Math.floor(ms/(1000*60*60*24));
}

function touchProject(proj){
  proj.lastActivity=new Date().toISOString();
  save();
}

// ─── NAV ─────────────────────────────────────────────────────────────────────
function renderNav(){
  const verts={};
  S.projects.forEach(proj=>{
    if(!verts[proj.vertical])verts[proj.vertical]=[];
    verts[proj.vertical].push(proj);
  });

  // Update HQ home button
  const hqBtn=document.getElementById('hq-home-btn');
  if(hqBtn){
    hqBtn.className='ni-hq'+(S.view==='focus'?' active':'');
  }

  let h='';
  Object.entries(verts).forEach(([v,ps])=>{
    h+=`<div class="nl">${v}</div>`;
    ps.forEach(proj=>{
      const stale=daysSince(proj.lastActivity);
      const isStale=stale!==null&&stale>=7;
      const isFresh=stale!==null&&stale<2;
      let indicator='';
      if(isStale)indicator=`<span class="ni-stale">↻ ${stale}d</span>`;
      else if(isFresh&&stale!==null)indicator=`<span class="ni-streak">●</span>`;
      h+=`<div class="ni${proj.id===S.active&&S.view==='project'?' active':''}" data-id="${proj.id}">
        <span class="nd ${proj.dot}"></span>
        <span style="flex:1">${proj.label}</span>
        ${indicator}
      </div>`;
    });
  });
  h+=`<div style="flex:1"></div><div style="border-top:1px solid var(--br);padding-top:4px">
    <div class="niadd" id="reviewbtn">↺ Weekly review</div>
    <div class="niadd" id="addprojbtn">+ new project</div>
  </div>`;
  document.getElementById('nav-body').innerHTML=h;

  document.querySelectorAll('.ni[data-id]').forEach(el=>{
    el.addEventListener('click',()=>{
      S.active=el.dataset.id;S.tab='overview';S.setup=false;S.view='project';
      touchProject(p());render();
    });
  });
  document.getElementById('addprojbtn').addEventListener('click',showAddProject);
  document.getElementById('reviewbtn').addEventListener('click',openReview);
  document.getElementById('hq-home-btn').addEventListener('click',()=>{
    S.view='focus';S.setup=false;render();
  });
  document.getElementById('search-trigger-btn').addEventListener('click',openSearch);
}

// ─── TOPBAR ───────────────────────────────────────────────────────────────────
function renderTopbar(){
  if(S.view==='focus'){
    document.getElementById('pt').textContent='Daily Focus';
    document.getElementById('pb').textContent='';
    document.getElementById('pb').className='sbadge';
    document.getElementById('cfgbtn').style.display='none';
    document.getElementById('tabsrow').innerHTML='';
    return;
  }
  document.getElementById('cfgbtn').style.display='';
  const proj=p();
  const ptEl=document.getElementById('pt');
  ptEl.textContent=proj.label;
  ptEl.onblur=()=>{const v=ptEl.textContent.trim();if(v&&v!==proj.label){p().label=v;save();renderNav();toast('Project renamed');}};
  ptEl.onkeydown=e=>{if(e.key==='Enter'){e.preventDefault();ptEl.blur();}};

  const b=document.getElementById('pb');

// ─── FEATURE 1: DAILY FOCUS VIEW ─────────────────────────────────────────────
function renderFocusView(){
  const today=new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});

  // Gather all urgent / overdue tasks
  const allUrgent=[];
  S.projects.forEach(proj=>{
    proj.tasks.filter(t=>!t.d&&t.due).forEach(t=>{
      const diff=dueDiff(t.due);
      if(diff<=3)allUrgent.push({proj,task:t,diff});
    });
  });
  allUrgent.sort((a,b)=>a.diff-b.diff);

  // All next actions
  const actionsHTML=S.projects.map(proj=>{
    const dotColor=proj.dot==='dl'?'var(--green)':proj.dot==='db'?'var(--y)':proj.dot==='da'?'var(--blue)':'var(--tx3)';
    const stale=daysSince(proj.lastActivity);
    const staleTag=stale!==null&&stale>=7?`<span style="font-family:'Space Mono',monospace;font-size:8px;color:var(--orange);margin-left:6px">↻ ${stale}d ago</span>`:'';
    return `<div class="focus-action-row" data-goto="${proj.id}">
      <div class="focus-proj-dot" style="background:${dotColor}"></div>
      <div style="flex:1">
        <div class="focus-proj-name">${proj.label}${staleTag}</div>
        <div class="focus-action-text">${proj.nextAction||'No next action set.'}</div>
      </div>
      <div class="focus-goto">→</div>
    </div>`;
  }).join('');

  // Overdue / due soon section
  let urgentHTML='';
  if(allUrgent.length){
    urgentHTML=`
      <div class="sechd" style="margin-bottom:10px">Due soon</div>
      <div class="tlist" style="margin-bottom:20px">
        ${allUrgent.map(({proj,task,diff})=>{
          const cls=diff<0?'overdue':diff<=1?'due-soon':'';
          const label=diff<0?`${Math.abs(diff)}d overdue`:diff===0?'Today':diff===1?'Tomorrow':`${diff}d`;
          const badgeCls=diff<0?'overdue':diff<=1?'due-soon':'future';
          return `<div class="trow ${cls}">
            <div class="tck" data-focuscheck="${proj.id}|${task.id}"></div>
            <span style="flex:1;font-size:13px">${task.t}</span>
            <span style="font-family:'Space Mono',monospace;font-size:9px;color:var(--tx3);margin-right:6px">${proj.label}</span>
            <span class="due-badge ${badgeCls}">${label}</span>
          </div>`;
        }).join('')}
      </div>`;
  }

  // Open task counts
  const taskSummary=S.projects.map(proj=>{
    const open=proj.tasks.filter(t=>!t.d).length;
    return `<span style="font-family:'Space Mono',monospace;font-size:10px;color:var(--tx3)">${proj.label}: <strong style="color:var(--tx)">${open}</strong></span>`;
  }).join('<span style="color:var(--br2);margin:0 8px">·</span>');

  document.getElementById('scroll-body').innerHTML=`
    <div class="focus-hero anim-fade-up">
      <div class="focus-hero-hd">Daily Focus</div>
      <div class="focus-hero-sub">${today.toUpperCase()}</div>
      <div class="focus-action-list" id="focus-actions">${actionsHTML}</div>
    </div>
    ${urgentHTML}
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <div class="sechd" style="margin-bottom:0">Open task count</div>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:12px;margin-bottom:20px;padding:12px 14px;background:var(--bg2);border:1px solid var(--br);border-radius:var(--radl)">${taskSummary}</div>
  `;

  document.querySelectorAll('[data-goto]').forEach(el=>{
    el.addEventListener('click',()=>{
      S.active=el.dataset.goto;S.tab='overview';S.view='project';S.setup=false;
      touchProject(S.projects.find(x=>x.id===el.dataset.goto));
      render();
    });
  });

  document.querySelectorAll('[data-focuscheck]').forEach(el=>{
    el.addEventListener('click',()=>{
      const [pid,tid]=el.dataset.focuscheck.split('|');
      const proj=S.projects.find(x=>x.id===pid);
      if(proj){const t=proj.tasks.find(x=>x.id===tid);if(t){t.d=true;save();renderFocusView();}}
    });
  });
}

// ─── FEATURE 2: DUE DATES ────────────────────────────────────────────────────
function dueDiff(due){
  if(!due)return null;
  const today=new Date();today.setHours(0,0,0,0);
  const d=new Date(due+'T00:00:00');
  return Math.round((d-today)/(1000*60*60*24));
}

function dueBadge(due,done){
  if(!due)return '';
  if(done)return `<span class="due-badge done-badge">✓ done</span>`;
  const diff=dueDiff(due);
  if(diff===null)return '';
  if(diff<0)return `<span class="due-badge overdue">${Math.abs(diff)}d late</span>`;
  if(diff===0)return `<span class="due-badge due-soon">Today</span>`;
  if(diff===1)return `<span class="due-badge due-soon">Tomorrow</span>`;
  if(diff<=7)return `<span class="due-badge future">${diff}d</span>`;
  return `<span class="due-badge future">${due}</span>`;
}

function dueRowClass(due,done){
  if(done||!due)return '';
  const diff=dueDiff(due);
  if(diff===null)return '';
  if(diff<0)return ' overdue';
  if(diff<=2)return ' due-soon';
  return '';
}

// ─── TASKS (with due dates) ───────────────────────────────────────────────────
function renderTasks(){
  const proj=p();
  const total=proj.tasks.length,done=proj.tasks.filter(t=>t.d).length;
  const pct=total?Math.round(done/total*100):0;

  // Sort: overdue first, then by due date, then no-date
  const sorted=[...proj.tasks].sort((a,b)=>{
    if(a.d&&!b.d)return 1;if(!a.d&&b.d)return -1;
    const ad=a.due?dueDiff(a.due):999;
    const bd=b.due?dueDiff(b.due):999;
    return ad-bd;
  });

  const tHTML=sorted.map(t=>`
    <div class="trow${t.d?' done':''}${dueRowClass(t.due,t.d)}" data-tid="${t.id}">
      <div class="tck${t.d?' on':''}" data-check="${t.id}">${t.d?'✓':''}</div>
      <input class="tinline${t.d?' done':''}" value="${t.t.replace(/"/g,'&quot;')}" data-tedit="${t.id}" ${t.d?'disabled':''}/>
      ${dueBadge(t.due,t.d)}
      <div class="tactions">
        <input type="date" class="due-input" value="${t.due||''}" data-duefor="${t.id}" title="Set due date" style="width:130px;font-size:10px;padding:3px 6px;${t.d?'opacity:.4':''}"/>
        <button class="editbtn" data-tsave="${t.id}" title="Save">✓</button>
        <button class="rmbtn" data-trm="${t.id}" title="Delete">×</button>
      </div>
    </div>`).join('');

  document.getElementById('scroll-body').innerHTML=`
    <div class="proglbl">${pct}% complete — ${done} of ${total} done</div>
    <div class="progwrap" style="margin-bottom:18px"><div class="progbar" style="width:${pct}%"></div></div>
    <div class="tlist" id="tlist">${tHTML}</div>
    <div style="display:flex;gap:8px;margin-top:12px;align-items:center" class="anim-fade-up">
      <input id="newtaskinput" placeholder="Add a task..." style="flex:1"/>
      <input type="date" id="newtaskdue" style="width:140px;font-size:11px" title="Optional due date"/>
      <button class="savebtn" id="addtaskbtn" style="padding:8px 16px;white-space:nowrap">Add</button>
    </div>
  `;
  stagger('.trow','anim-fade-up',35);

  document.querySelectorAll('[data-check]').forEach(el=>{
    el.addEventListener('click',()=>{
      const t=proj.tasks.find(x=>x.id===el.dataset.check);
      if(t){t.d=!t.d;save();renderTasks();}
    });
  });
  document.querySelectorAll('[data-trm]').forEach(btn=>{
    btn.addEventListener('click',()=>{proj.tasks=proj.tasks.filter(t=>t.id!==btn.dataset.trm);save();renderTasks();toast('Task deleted');});
  });
  document.querySelectorAll('[data-tsave]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const t=proj.tasks.find(x=>x.id===btn.dataset.tsave);
      const inp=document.querySelector(`[data-tedit="${btn.dataset.tsave}"]`);
      if(t&&inp){t.t=inp.value.trim()||t.t;save();toast('Task saved');}
    });
  });
  document.querySelectorAll('[data-duefor]').forEach(inp=>{
    inp.addEventListener('change',()=>{
      const t=proj.tasks.find(x=>x.id===inp.dataset.duefor);
      if(t){t.due=inp.value;save();renderTasks();toast(inp.value?'Due date set':'Due date cleared');}
    });
  });
  document.querySelectorAll('[data-tedit]').forEach(inp=>{
    inp.addEventListener('keydown',e=>{
      if(e.key==='Enter'){document.querySelector(`[data-tsave="${inp.dataset.tedit}"]`)?.click();}
    });
  });

  const ni=document.getElementById('newtaskinput');
  const nd=document.getElementById('newtaskdue');
  const addFn=()=>{
    const v=ni.value.trim();if(!v)return;
    proj.tasks.push({id:uid(),t:v,d:false,due:nd.value||''});
    ni.value='';nd.value='';save();renderTasks();

  ni.addEventListener('keydown',e=>{if(e.key==='Enter')addFn();});

          <button class="kbaddbtn" data-addbtn="${col.id}">+ Add</button>
        </div>
      </div>`;
  }).join('');

  document.getElementById('scroll-body').innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <div class="sechd" style="margin-bottom:0">${kb.cards.length} cards — drag to move, click to open</div>
      <button class="savebtn" id="addcolbtn" style="font-size:10px;padding:6px 14px">+ Column</button>
    </div>
    <div id="kbwrap">${colsHTML}</div>
  `;
  stagger('.kbcard','anim-scale-in',40);

  document.querySelectorAll('[data-colid]').forEach(el=>{
    el.addEventListener('blur',()=>{
      const col=kb.cols.find(c=>c.id===el.dataset.colid);
      if(col&&el.textContent.trim()){col.title=el.textContent.trim();save();}
    });
    el.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();el.blur();}});
  });
  document.querySelectorAll('[data-colrm]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const colId=btn.dataset.colrm;
      if(kb.cards.filter(c=>c.col===colId).length&&!confirm('Delete column and all its cards?'))return;
      kb.cols=kb.cols.filter(c=>c.id!==colId);
      kb.cards=kb.cards.filter(c=>c.col!==colId);
      save();renderKanban();toast('Column deleted');
    });
  });
  document.getElementById('addcolbtn').addEventListener('click',()=>{
    const title=prompt('Column name:');
    if(!title)return;
    kb.cols.push({id:uid(),title:title.trim()});
    save();renderKanban();toast('Column added');
  });
  document.querySelectorAll('[data-addbtn]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const colId=btn.dataset.addbtn;
      const inp=document.querySelector(`[data-addcol="${colId}"]`);
      const v=inp.value.trim();if(!v)return;
      const card={id:uid(),col:colId,title:v,desc:'',tag:'',checklist:[],media:[]};
      kb.cards.push(card);inp.value='';save();renderKanban();
    });
  });
  document.querySelectorAll('[data-addcol]').forEach(inp=>{
    inp.addEventListener('keydown',e=>{
      if(e.key==='Enter'){document.querySelector(`[data-addbtn="${inp.dataset.addcol}"]`)?.click();}
    });
  });

  let dragId=null;
  document.querySelectorAll('.kbcard').forEach(card=>{
    card.addEventListener('click',()=>openDrawer(card.dataset.cid));
    card.addEventListener('dragstart',e=>{dragId=card.dataset.cid;setTimeout(()=>card.classList.add('dragging'),0);e.dataTransfer.effectAllowed='move';});
    card.addEventListener('dragend',()=>{card.classList.remove('dragging');document.querySelectorAll('.kbcol').forEach(c=>c.classList.remove('dragover'));});
  });
  document.querySelectorAll('.kbcol').forEach(col=>{
    col.addEventListener('dragover',e=>{e.preventDefault();col.classList.add('dragover');});
    col.addEventListener('dragleave',e=>{if(!col.contains(e.relatedTarget))col.classList.remove('dragover');});
    col.addEventListener('drop',e=>{
      e.preventDefault();col.classList.remove('dragover');
      const card=kb.cards.find(c=>c.id===dragId);
      if(card){card.col=col.dataset.col;save();renderKanban();}
    });
  });
}

// ─── CARD DRAWER ─────────────────────────────────────────────────────────────
function openDrawer(cardId){
  const proj=p();
  const card=proj.kanban.cards.find(c=>c.id===cardId);
  if(!card)return;
  S.drawerCardId=cardId;

  document.getElementById('drawer-title').value=card.title;
  document.getElementById('drawer-del').onclick=()=>{
    if(!confirm('Delete this card?'))return;
    proj.kanban.cards=proj.kanban.cards.filter(c=>c.id!==cardId);
    save();closeDrawer();renderKanban();toast('Card deleted');
  };

  const tags=['bug','feat','idea','content'];
  const mediaHTML=(card.media||[]).map((m,i)=>`
    <div class="media-thumb">
      <img src="${m.data}" alt=""/>
      <button class="mthumb-rm" data-mri="${i}">×</button>
    </div>`).join('');

  const checkHTML=(card.checklist||[]).map((ck,i)=>`
    <div class="dcheck-row">
      <div class="tck${ck.done?' on':''}" data-chk="${i}">${ck.done?'✓':''}</div>
      <input class="dcheck-lbl${ck.done?' done':''}" value="${ck.text}" data-chtext="${i}"/>
      <button class="rmbtn" data-chrm="${i}" style="width:22px;height:22px;font-size:11px">×</button>
    </div>`).join('');

  document.getElementById('drawer-body').innerHTML=`
    <div class="drawer-section">
      <div class="drawer-sechd">Tag</div>
      <div class="drawer-tag-row">
        <div class="drawer-tag${!card.tag?' on':''}" data-tag="">none</div>
        ${tags.map(t=>`<div class="drawer-tag tag-${t}${card.tag===t?' on':''}" data-tag="${t}">${t}</div>`).join('')}
      </div>
    </div>
    <div class="drawer-section">
      <div class="drawer-sechd">Description</div>
      <textarea class="drawer-desc" id="drawer-desc" placeholder="Add notes, context, links...">${card.desc||''}</textarea>
    </div>
    <div class="drawer-section">
      <div class="drawer-sechd">Checklist</div>
      <div class="drawer-checklist" id="drawer-checklist">${checkHTML}</div>
      <div style="display:flex;gap:6px;margin-top:7px">
        <input id="ck-new-input" placeholder="Add checklist item..." style="flex:1;font-size:12px"/>
        <button class="savebtn" id="ck-add-btn" style="font-size:10px;padding:6px 12px;white-space:nowrap">Add</button>
      </div>
    </div>
    <div class="drawer-section">
      <div class="drawer-sechd">Media</div>
      <div class="media-grid" id="media-grid">${mediaHTML}</div>
      <label class="upload-btn" for="media-upload">+ Upload image</label>
      <input type="file" id="media-upload" accept="image/*" style="display:none" multiple/>
    </div>
  `;

  document.querySelectorAll('[data-tag]').forEach(el=>{
    el.addEventListener('click',()=>{
      document.querySelectorAll('[data-tag]').forEach(x=>x.classList.remove('on'));
      el.classList.add('on');card.tag=el.dataset.tag;
    });
  });

  const renderChecklist=()=>{
    document.getElementById('drawer-checklist').innerHTML=(card.checklist||[]).map((ck,i)=>`
      <div class="dcheck-row">
        <div class="tck${ck.done?' on':''}" data-chk="${i}">${ck.done?'✓':''}</div>
        <input class="dcheck-lbl${ck.done?' done':''}" value="${ck.text}" data-chtext="${i}"/>
        <button class="rmbtn" data-chrm="${i}" style="width:22px;height:22px;font-size:11px">×</button>
      </div>`).join('');
    attachChecklistEvents();
  };
  const attachChecklistEvents=()=>{
    document.querySelectorAll('[data-chk]').forEach(el=>{
      el.addEventListener('click',()=>{card.checklist[+el.dataset.chk].done=!card.checklist[+el.dataset.chk].done;renderChecklist();});
    });
    document.querySelectorAll('[data-chrm]').forEach(btn=>{
      btn.addEventListener('click',()=>{card.checklist.splice(+btn.dataset.chrm,1);renderChecklist();});
    });
    document.querySelectorAll('[data-chtext]').forEach(inp=>{
      inp.addEventListener('change',()=>{card.checklist[+inp.dataset.chtext].text=inp.value;});
    });
  };
  attachChecklistEvents();

  const ckInput=document.getElementById('ck-new-input');
  const ckAdd=()=>{const v=ckInput.value.trim();if(!v)return;card.checklist.push({text:v,done:false});ckInput.value='';renderChecklist();};
  document.getElementById('ck-add-btn').addEventListener('click',ckAdd);
  ckInput.addEventListener('keydown',e=>{if(e.key==='Enter')ckAdd();});

  document.querySelectorAll('[data-mri]').forEach(btn=>{
    btn.addEventListener('click',e=>{e.stopPropagation();card.media.splice(+btn.dataset.mri,1);openDrawer(cardId);});
  });

  document.getElementById('media-upload').addEventListener('change',function(){
    const files=Array.from(this.files);
    let loaded=0;
    files.forEach(file=>{
      const reader=new FileReader();
      reader.onload=e=>{
        card.media.push({data:e.target.result,name:file.name});
        loaded++;
        if(loaded===files.length){
          const g=document.getElementById('media-grid');
          if(g)g.innerHTML=(card.media||[]).map((m,i)=>`
            <div class="media-thumb"><img src="${m.data}" alt=""/>
              <button class="mthumb-rm" data-mri="${i}">×</button>
            </div>`).join('');
          document.querySelectorAll('[data-mri]').forEach(btn=>{
            btn.addEventListener('click',e=>{e.stopPropagation();card.media.splice(+btn.dataset.mri,1);openDrawer(cardId);});
          });
          toast(`${files.length} image${files.length>1?'s':''} uploaded`);
        }
      };
      reader.readAsDataURL(file);
    });
    this.value='';
  });

  document.getElementById('drawer-overlay').classList.add('open');
  document.getElementById('drawer').classList.add('open');
}

function saveDrawer(){
  const proj=p();
  const card=proj.kanban.cards.find(c=>c.id===S.drawerCardId);
  if(!card)return;
  const titleEl=document.getElementById('drawer-title');
  const descEl=document.getElementById('drawer-desc');
  if(titleEl)card.title=titleEl.value.trim()||card.title;
  if(descEl)card.desc=descEl.value;
  save();renderKanban();toast('Card saved');
}

function closeDrawer(){
  saveDrawer();
  document.getElementById('drawer-overlay').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
  S.drawerCardId=null;
}

function renderAnalytics(){
  const proj=p();
  const sb=document.getElementById('scroll-body');
  if(!proj.gaPropertyId){
    sb.innerHTML=`
      <div class="ganotcfg">
        <p>No GA4 property linked.<br/>Add your Property ID in <strong>Configure</strong>.</p>
        <button class="savebtn" onclick="S.setup=true;render()">Open Configure</button>
        <div class="gasetup-steps">
          <div>1. GA → Admin → Property Settings → copy <strong>Property ID</strong></div>
          <div>2. Create a Service Account in Google Cloud Console</div>
          <div>3. Grant it <strong>Viewer</strong> access in GA → Account Access Management</div>
          <div>4. Add <code>GA_CLIENT_EMAIL</code> + <code>GA_PRIVATE_KEY</code> in Netlify env vars</div>
          <div>5. Paste the Property ID in Configure below</div>
        </div>
      </div>`;
    return;
  }
  const ck=`${proj.id}_${S.gaRange}`;
  if(S.gaCache[ck]){renderGAData(S.gaCache[ck]);return;}
  sb.innerHTML=`<div style="text-align:center;padding:48px;font-family:'Space Mono',monospace;font-size:11px;color:var(--tx3);letter-spacing:.1em">// fetching analytics...</div>`;
  fetchGA(proj.gaPropertyId,S.gaRange,ck);
}

async function fetchGA(pid,range,ck){
  try{
    const res=await fetch('/.netlify/functions/ga4',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({propertyId:pid,dateRange:range})});
    const data=await res.json();
    if(data.error)throw new Error(data.error);
    S.gaCache[ck]=data;renderGAData(data);
  }catch(err){
    document.getElementById('scroll-body').innerHTML=`<div style="background:var(--bg2);border:1px solid #7f1d1d;border-radius:var(--radl);padding:16px;font-size:13px;color:#fca5a5;line-height:1.7"><strong>Error:</strong> ${err.message}</div>`;
  }
}

function renderGAData(data){
  const fmtDur=s=>{const m=Math.floor(s/60);return m>0?`${m}m ${s%60}s`:`${s}s`;};
  const maxPV=Math.max(...(data.topPages||[]).map(r=>r.val),1);
  const maxEV=Math.max(...(data.topEvents||[]).map(r=>r.val),1);
  const ranges=[['7daysAgo','7d'],['28daysAgo','28d'],['90daysAgo','90d']];
  const proj=p();
  document.getElementById('scroll-body').innerHTML=`
    <div class="garange-row">
      ${ranges.map(([k,l])=>`<button class="garange-btn${S.gaRange===k?' on':''}" data-range="${k}">${l}</button>`).join('')}
      <div style="flex:1"></div>
      <button class="garange-btn" id="garefresh">↺ Refresh</button>
    </div>
    <div class="gagrid">
      <div class="gacard"><div class="galabel">Sessions</div><div class="gaval">${data.sessions.toLocaleString()}</div></div>
      <div class="gacard"><div class="galabel">Active users</div><div class="gaval">${data.activeUsers.toLocaleString()}</div></div>
      <div class="gacard"><div class="galabel">Avg duration</div><div class="gaval">${fmtDur(+data.avgDuration)}</div></div>
      <div class="gacard"><div class="galabel">Bounce rate</div><div class="gaval">${data.bounceRate}%</div></div>
    </div>
    <div class="row2" style="gap:20px">
      <div>
        <div class="sechd">Top pages</div>
        <table class="gatable"><thead><tr><th>Page</th><th>Views</th></tr></thead><tbody>
          ${(data.topPages||[]).map(r=>`<tr><td><div style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.dim}</div><div class="gabar-wrap"><div class="gabar" style="width:${Math.round(r.val/maxPV*100)}%"></div></div></td><td>${r.val.toLocaleString()}</td></tr>`).join('')}
        </tbody></table>
      </div>
      <div>
        <div class="sechd">Top events</div>
        <table class="gatable"><thead><tr><th>Event</th><th>Count</th></tr></thead><tbody>
          ${(data.topEvents||[]).map(r=>`<tr><td><div style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.dim}</div><div class="gabar-wrap"><div class="gabar" style="width:${Math.round(r.val/maxEV*100)}%"></div></div></td><td>${r.val.toLocaleString()}</td></tr>`).join('')}
        </tbody></table>
      </div>
    </div>
  `;
  document.querySelectorAll('.garange-btn[data-range]').forEach(btn=>{
    btn.addEventListener('click',()=>{S.gaRange=btn.dataset.range;renderAnalytics();});
  });
  document.getElementById('garefresh').addEventListener('click',()=>{delete S.gaCache[`${proj.id}_${S.gaRange}`];renderAnalytics();});
}

// ─── FEATURE 4: GLOBAL SEARCH ────────────────────────────────────────────────
let searchSelectedIdx=-1;

function openSearch(){
  document.getElementById('search-overlay').classList.add('open');
  const inp=document.getElementById('search-input');
  inp.value='';inp.focus();
  renderSearchResults('');
}

function closeSearch(){
  document.getElementById('search-overlay').classList.remove('open');
  searchSelectedIdx=-1;
}

function renderSearchResults(q){
  const container=document.getElementById('search-results');
  if(!q.trim()){
    container.innerHTML=`<div class="search-empty">Type to search tasks, notes, and cards</div>`;
    return;
  }
  const ql=q.toLowerCase();
  const results=[];

  S.projects.forEach(proj=>{
    // Tasks
    proj.tasks.forEach(t=>{
      if(t.t.toLowerCase().includes(ql)){
        results.push({type:'task',proj:proj.label,projId:proj.id,text:t.t,sub:'',action:()=>{S.active=proj.id;S.tab='tasks';S.view='project';S.setup=false;closeSearch();render();}});
      }
    });
    // Notes
    proj.notes.forEach(n=>{
      const match=(n.title||'').toLowerCase().includes(ql)||(n.body||'').toLowerCase().includes(ql);
      if(match){
        results.push({type:'note',proj:proj.label,projId:proj.id,text:n.title||'Untitled',action:()=>{S.active=proj.id;S.tab='notes';S.view='project';S.setup=false;closeSearch();render();}});
      }
    });
    // Kanban cards
    proj.kanban?.cards.forEach(c=>{
      if(c.title.toLowerCase().includes(ql)||(c.desc||'').toLowerCase().includes(ql)){
        results.push({type:'card',proj:proj.label,projId:proj.id,text:c.title,cardId:c.id,action:()=>{S.active=proj.id;S.tab='kanban';S.view='project';S.setup=false;closeSearch();render();setTimeout(()=>openDrawer(c.id),100);}});
      }
    });
  });

  if(!results.length){
    container.innerHTML=`<div class="search-empty">No results for "${q}"</div>`;
    return;
  }

  function highlight(text){
    const i=text.toLowerCase().indexOf(ql);
    if(i<0)return text;
    return text.slice(0,i)+`<mark>${text.slice(i,i+q.length)}</mark>`+text.slice(i+q.length);
  }

  container.innerHTML=results.slice(0,12).map((r,i)=>`
    <div class="search-result" data-sri="${i}">
      <div class="search-result-type">${r.type}</div>
      <div class="search-result-proj">${r.proj}</div>
      <div class="search-result-text">${highlight(r.text)}</div>
    </div>`).join('');

  container.querySelectorAll('.search-result').forEach((el,i)=>{
    el.addEventListener('click',()=>results[i].action());
    el.addEventListener('mouseenter',()=>{
      searchSelectedIdx=i;
      container.querySelectorAll('.search-result').forEach((x,j)=>x.style.background=j===i?'var(--bg3)':'');
    });
  });

  searchSelectedIdx=-1;
}

document.getElementById('search-input').addEventListener('input',e=>renderSearchResults(e.target.value));
document.getElementById('search-input').addEventListener('keydown',e=>{
  const items=document.querySelectorAll('.search-result');
  if(e.key==='ArrowDown'){e.preventDefault();searchSelectedIdx=Math.min(searchSelectedIdx+1,items.length-1);}
  else if(e.key==='ArrowUp'){e.preventDefault();searchSelectedIdx=Math.max(searchSelectedIdx-1,0);}
  else if(e.key==='Enter'&&searchSelectedIdx>=0){items[searchSelectedIdx]?.click();return;}
  else if(e.key==='Escape'){closeSearch();return;}
  items.forEach((el,i)=>el.style.background=i===searchSelectedIdx?'var(--bg3)':'');
});
document.getElementById('search-overlay').addEventListener('click',e=>{
  if(e.target===document.getElementById('search-overlay'))closeSearch();
});

// ─── FEATURE 5: WEEKLY REVIEW ─────────────────────────────────────────────────
function openReview(){
  const data=getStreakData();
  const lastReview=data.lastReview;
  const daysSinceReview=lastReview?daysSince(lastReview.slice(0,10)):null;

  document.getElementById('review-sub-text').textContent=
    lastReview?`Last reviewed ${daysSinceReview===0?'today':daysSinceReview===1?'yesterday':`${daysSinceReview}d ago`}`:'First review — let\'s go';

  S.reviewStep=0;
  renderReviewStep();
  document.getElementById('review-overlay').classList.add('open');
}

function closeReview(){
  document.getElementById('review-overlay').classList.remove('open');
  // Record review timestamp
  let data;
  try{data=JSON.parse(localStorage.getItem('ns_hq_streak'))||{};}catch(e){data={};}
  data.lastReview=new Date().toISOString();
  data.days=data.days||[];
  localStorage.setItem('ns_hq_streak',JSON.stringify(data));
  renderStreakBar();
  toast('Review complete ✓');
}

function renderReviewStep(){
  const total=S.projects.length;
  const proj=S.projects[S.reviewStep];
  const nextBtn=document.getElementById('review-next-btn');
  document.getElementById('review-progress').textContent=`${S.reviewStep+1} of ${total}`;
  nextBtn.textContent=S.reviewStep<total-1?'Next →':'Finish ✓';
  nextBtn.onclick=()=>{
    // save any edits made during review
    const naInput=document.getElementById('review-na-edit');
    if(naInput&&naInput.value.trim()){
      S.projects[S.reviewStep].nextAction=naInput.value.trim();
      save();
    }
    if(S.reviewStep<total-1){S.reviewStep++;renderReviewStep();}
    else{closeReview();}
  };

  const openTasks=proj.tasks.filter(t=>!t.d).length;
  const overdueTasks=proj.tasks.filter(t=>!t.d&&t.due&&dueDiff(t.due)<0).length;
  const stale=daysSince(proj.lastActivity);

  document.getElementById('review-body').innerHTML=`
    <div class="review-proj-card current">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <div class="nd ${proj.dot}" style="width:9px;height:9px"></div>
        <div class="review-proj-name">${proj.label}</div>
        <span class="sbadge ${proj.badge}" style="font-size:8px;padding:3px 7px">${proj.badgeLabel}</span>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">
        <span style="font-family:'Space Mono',monospace;font-size:10px;color:var(--tx3)">${openTasks} open task${openTasks!==1?'s':''}</span>
        ${overdueTasks?`<span style="font-family:'Space Mono',monospace;font-size:10px;color:var(--red)">⚠ ${overdueTasks} overdue</span>`:''}
        ${stale!==null?`<span style="font-family:'Space Mono',monospace;font-size:10px;color:${stale>=7?'var(--orange)':'var(--tx3)'}">Last active: ${stale===0?'today':stale===1?'yesterday':stale+'d ago'}</span>`:''}
      </div>
      <div class="review-na-label">Current next action</div>
      <div class="review-na-text">${proj.nextAction||'—'}</div>
      <div class="review-actions">
        <button class="review-btn" id="review-accurate-btn">✓ Still accurate</button>
        <button class="review-btn" id="review-update-btn">✎ Update it</button>
        <button class="review-btn" onclick="S.active='${proj.id}';S.tab='tasks';S.view='project';S.setup=false;closeReview();render();">Open project →</button>
      </div>
      <div class="review-edit-wrap" id="review-edit-wrap">
        <div class="fl" style="margin-top:10px;margin-bottom:8px">
          <label>Updated next action</label>
          <input id="review-na-edit" placeholder="What actually moves this forward?" value="${proj.nextAction||''}"/>
        </div>
      </div>
    </div>
    ${S.projects.slice(S.reviewStep+1).map(p2=>`
      <div class="review-proj-card" style="opacity:.5">
        <div style="display:flex;align-items:center;gap:8px">
          <div class="nd ${p2.dot}" style="width:7px;height:7px"></div>
          <div style="font-size:13px;color:var(--tx2)">${p2.label}</div>
        </div>
      </div>`).join('')}
  `;

  document.getElementById('review-accurate-btn').addEventListener('click',()=>{
    document.getElementById('review-edit-wrap').classList.remove('open');
    toast('Marked accurate');
  });
  document.getElementById('review-update-btn').addEventListener('click',()=>{
    const wrap=document.getElementById('review-edit-wrap');
    wrap.classList.toggle('open');
    if(wrap.classList.contains('open'))document.getElementById('review-na-edit')?.focus();
  });
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function switchTab(t){S.tab=t;renderTopbar();renderBody();}
function toggleSetup(){S.setup=!S.setup;S.tab='overview';render();}

function renderBody(){
  if(S.view==='focus'){renderFocusView();return;}
  if(S.setup){renderSetup();return;}
  const tab=S.tab;
  if(tab==='tasks'){renderTasks();return;}
  if(tab==='kanban'){renderKanban();return;}
  if(tab==='notes'){renderNotes();return;}
  if(tab==='analytics'){renderAnalytics();return;}
  renderOverview();
}

function render(){renderNav();renderTopbar();renderBody();}

// ─── KEYBOARD SHORTCUT: Cmd+K ────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();openSearch();}
  if(e.key==='Escape'){
    if(document.getElementById('search-overlay').classList.contains('open'))closeSearch();
    if(document.getElementById('review-overlay').classList.contains('open'))closeReview();
  }
});

// ─── INIT ─────────────────────────────────────────────────────────────────────
const visitData=recordVisit();
renderStreakBar();
render();
</script>
